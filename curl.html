<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CURL · API 对比器</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2358a6ff'/><stop offset='100%' style='stop-color:%23a371f7'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white' font-weight='bold'>⟁</text></svg>" />
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsondiffpatch@0.5.0/public/formatters-styles/html.css" />
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --border: #30363d;
            --border-light: #484f58;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-a: #58a6ff;
            --accent-b: #d2991d;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d2991d;
            --blue: #58a6ff;
            --purple: #a371f7;
            --pink: #db61a2;
            --orange: #f0883e;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 4px 16px rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; min-height:100vh; padding:1.5rem; line-height:1.5; }
        .app-container { max-width:1600px; margin:0 auto; height:94vh; display:grid; grid-template-rows:auto auto 1fr auto; gap:0.8rem; background:var(--bg-secondary); border-radius:var(--radius-lg); padding:1.2rem; border:1px solid var(--border); box-shadow:var(--shadow); transition:all 0.3s ease; }
        .header { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:1rem; padding-bottom:0.8rem; border-bottom:1px solid var(--border); }
        .header-title { display:grid; grid-auto-flow:column; align-items:center; gap:0.6rem; }
        .logo { width:28px; height:28px; background:linear-gradient(135deg,var(--accent-a),var(--purple)); border-radius:6px; display:grid; place-items:center; font-size:0.9rem; }
        .header h1 { font-size:1.2rem; font-weight:600; color:var(--text); }
        .badge { background:rgba(88,166,255,0.12); color:var(--accent-a); font-size:0.65rem; font-weight:600; padding:0.2rem 0.7rem; border-radius:12px; border:1px solid rgba(88,166,255,0.2); }
        .mode-indicator { display:grid; grid-auto-flow:column; align-items:center; gap:0.4rem; font-size:0.7rem; color:var(--text-secondary); background:var(--bg-tertiary); padding:0.3rem 0.7rem; border-radius:20px; }
        .mode-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .toolbar { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:0.6rem; }
        .btn-group { display:grid; grid-auto-flow:column; gap:0.5rem; }
        .btn { display:inline-grid; grid-auto-flow:column; align-items:center; gap:0.4rem; padding:0.5rem 0.9rem; border-radius:var(--radius); font-weight:500; font-size:0.78rem; border:1px solid var(--border); background:var(--bg-tertiary); color:var(--text); cursor:pointer; transition:all 0.15s ease; white-space:nowrap; font-family:inherit; }
        .btn:hover { background:var(--border-light); border-color:var(--text-muted); }
        .btn-primary { background:#238636; border-color:#2ea043; color:#fff; font-weight:600; }
        .btn-primary:hover { background:#2ea043; }
        .btn-success { background:#1f6feb; border-color:#388bfd; color:#fff; font-weight:600; }
        .btn-success:hover { background:#388bfd; }
        .btn-sm { padding:0.35rem 0.7rem; font-size:0.72rem; }
        .btn-icon { padding:0.4rem; min-width:30px; justify-content:center; }
        .btn-outline { background:transparent; border-color:var(--border); }
        .btn-outline:hover { border-color:var(--accent-a); color:var(--accent-a); }
        .btn-active { background:rgba(88,166,255,0.15); border-color:var(--accent-a); color:var(--accent-a); }
        .btn-danger { color:var(--red); }
        .btn-danger:hover { background:rgba(248,81,73,0.15); border-color:var(--red); }
        .btn-format { color:var(--purple); border-color:var(--purple); }
        .btn-format:hover { background:rgba(163,113,247,0.12)!important; border-color:var(--purple); }
        .main-content { display:grid; gap:0.8rem; overflow:hidden; min-height:0; }
        .main-content.single { grid-template-rows:auto 1fr; }
        .main-content.dual { grid-template-rows:auto 1fr auto; }
        .request-grid { display:grid; gap:0.8rem; }
        .request-grid.single { grid-template-columns:1fr; }
        .request-grid.dual { grid-template-columns:1fr 1fr; }
        .request-card { background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border); display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
        .request-header { display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; padding:0.5rem 0.8rem; background:var(--bg-tertiary); border-bottom:1px solid var(--border); gap:0.4rem; }
        .request-label { display:grid; grid-auto-flow:column; align-items:center; gap:0.4rem; font-size:0.75rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; }
        .dot { width:8px; height:8px; border-radius:50%; }
        .dot-a { background:var(--accent-a); box-shadow:0 0 6px rgba(88,166,255,0.5); }
        .dot-b { background:var(--accent-b); box-shadow:0 0 6px rgba(210,153,29,0.5); }
        .editor-container { height:200px; overflow:hidden; }
        .response-grid { display:grid; gap:0.8rem; min-height:0; }
        .response-grid.single { grid-template-columns:1fr; }
        .response-grid.dual { grid-template-columns:1fr 1fr; }
        .response-panel { background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border); display:grid; grid-template-rows:auto auto auto 1fr; overflow:hidden; min-height:0; }
        .response-panel.fullscreen { position:fixed; top:1rem; left:1rem; right:1rem; bottom:1rem; z-index:9999; border-radius:var(--radius-lg); box-shadow:0 0 0 100vmax rgba(0,0,0,0.7); }
        .response-header { display:grid; grid-template-columns:auto 1fr auto; align-items:center; padding:0.4rem 0.7rem; background:var(--bg-tertiary); border-bottom:1px solid var(--border); gap:0.5rem; }
        .response-tabs { display:grid; grid-auto-flow:column; gap:0.2rem; padding:0.2rem 0.5rem; background:rgba(0,0,0,0.2); border-bottom:1px solid var(--border); }
        .tab-btn { padding:0.2rem 0.6rem; border-radius:4px; font-size:0.68rem; font-weight:500; border:none; background:transparent; color:var(--text-secondary); cursor:pointer; transition:all 0.15s; font-family:inherit; }
        .tab-btn:hover { color:var(--text); background:var(--bg-tertiary); }
        .tab-btn.active { background:var(--bg-tertiary); color:var(--accent-a); }
        .status-badge { display:grid; grid-auto-flow:column; align-items:center; gap:0.3rem; padding:0.2rem 0.6rem; border-radius:12px; font-size:0.7rem; font-weight:600; }
        .status-success { background:rgba(63,185,80,0.12); color:var(--green); }
        .status-error { background:rgba(248,81,73,0.12); color:var(--red); }
        .status-pending { background:rgba(210,153,29,0.12); color:var(--yellow); }
        .time-text { font-size:0.68rem; color:var(--text-muted); font-family:'JetBrains Mono', monospace; }
        .search-bar { display:none; grid-template-columns:1fr auto auto auto; gap:0.3rem; padding:0.3rem 0.5rem; background:rgba(0,0,0,0.3); border-bottom:1px solid var(--border); align-items:center; }
        .search-bar.active { display:grid; }
        .search-input { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:0.25rem 0.5rem; color:var(--text); font-size:0.72rem; outline:none; font-family:'JetBrains Mono', monospace; width:100%; }
        .search-input:focus { border-color:var(--accent-a); }
        .search-count { font-size:0.65rem; color:var(--text-muted); white-space:nowrap; }
        .response-body { overflow-y:auto; padding:0.8rem; font-family:'JetBrains Mono','Fira Code',monospace; font-size:0.76rem; line-height:1.6; white-space:pre-wrap; word-break:break-word; min-height:0; position:relative; }
        .response-body mark { background:rgba(210,153,29,0.35); padding:0 2px; border-radius:2px; }
        .response-body mark.current { background:rgba(248,129,59,0.5); outline:1px solid var(--orange); }
        .response-body .highlight-line { background:rgba(248,129,59,0.25); border-left:3px solid var(--orange); padding-left:0.3rem; }
        .response-body .diff-line { padding:0 0.3rem; border-left:3px solid transparent; transition:background 0.3s; }
        .response-body .diff-line.added { border-left-color:var(--green); background:rgba(63,185,80,0.08); }
        .response-body .diff-line.removed { border-left-color:var(--red); background:rgba(248,81,73,0.08); }
        .response-body .diff-line.modified { border-left-color:var(--yellow); background:rgba(210,153,29,0.08); }
        .response-body .diff-line.highlight-target { background:rgba(248,129,59,0.35)!important; border-left-color:var(--orange)!important; animation:flash 1s ease 2; }
        @keyframes flash { 0%,100%{background:rgba(248,129,59,0.35);} 50%{background:rgba(248,129,59,0.1);} }
        .json-key { color:var(--accent-a); }
        .json-key-text { color:var(--accent-a); }
        .json-string { color:#a5d6ff; }
        .json-number { color:var(--orange); }
        .json-boolean { color:var(--pink); }
        .json-null { color:var(--text-muted); }
        .json-bracket { color:var(--text-secondary); }
        .collapsible { cursor:pointer; user-select:none; color:var(--text-secondary); }
        .collapsible:hover { color:var(--text); }
        .json-link { color:var(--accent-a); text-decoration:underline; cursor:pointer; }
        .json-link:hover { color:#79c0ff; }
        .image-preview-inline { max-width:300px; max-height:200px; border-radius:6px; margin:4px 0; border:1px solid var(--border); cursor:pointer; transition:transform 0.2s; display:block; }
        .image-preview-inline:hover { transform:scale(1.02); }
        .image-preview-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85); z-index:99999; display:grid; place-items:center; cursor:zoom-out; }
        .image-preview-overlay img { max-width:90vw; max-height:90vh; border-radius:8px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
        .image-preview-overlay .close-btn { position:absolute; top:1rem; right:1rem; background:var(--bg-tertiary); color:var(--text); border:1px solid var(--border); border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:1.2rem; display:grid; place-items:center; }
        .diff-panel { background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border); display:grid; grid-template-rows:auto 1fr; max-height:200px; overflow:hidden; }
        .diff-panel.fullscreen { position:fixed; top:1rem; left:1rem; right:1rem; bottom:1rem; z-index:9999; max-height:none; border-radius:var(--radius-lg); box-shadow:0 0 0 100vmax rgba(0,0,0,0.7); }
        .diff-header { display:grid; grid-template-columns:auto 1fr auto; align-items:center; padding:0.4rem 0.7rem; background:var(--bg-tertiary); border-bottom:1px solid var(--border); gap:0.5rem; font-size:0.78rem; font-weight:600; }
        .diff-stats { display:grid; grid-auto-flow:column; gap:0.4rem; }
        .diff-stat { padding:0.15rem 0.5rem; border-radius:10px; font-size:0.62rem; font-weight:700; text-transform:uppercase; }
        .diff-stat.added { background:rgba(63,185,80,0.15); color:var(--green); }
        .diff-stat.removed { background:rgba(248,81,73,0.15); color:var(--red); }
        .diff-stat.modified { background:rgba(210,153,29,0.15); color:var(--yellow); }
        .diff-list { overflow-y:auto; padding:0.4rem; font-family:'JetBrains Mono',monospace; font-size:0.7rem; }
        .diff-item { display:grid; grid-template-columns:auto 1fr auto; gap:0.5rem; padding:0.25rem 0.5rem; border-radius:4px; cursor:pointer; transition:background 0.1s; align-items:center; }
        .diff-item:hover { background:var(--bg-tertiary); }
        .diff-type { font-size:0.6rem; font-weight:700; padding:0.1rem 0.4rem; border-radius:8px; text-transform:uppercase; }
        .diff-type.added { background:rgba(63,185,80,0.2); color:var(--green); }
        .diff-type.removed { background:rgba(248,81,73,0.2); color:var(--red); }
        .diff-type.modified { background:rgba(210,153,29,0.2); color:var(--yellow); }
        .diff-path { color:var(--text-secondary); }
        .diff-preview { color:var(--text-muted); font-size:0.65rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .footer { display:grid; grid-template-columns:1fr auto; align-items:center; padding-top:0.5rem; border-top:1px solid var(--border); font-size:0.65rem; color:var(--text-muted); }
        .footer kbd { background:var(--bg-tertiary); padding:0.1rem 0.35rem; border-radius:3px; font-family:'JetBrains Mono',monospace; border:1px solid var(--border); }
        @media (max-width:900px) { .request-grid.dual,.response-grid.dual { grid-template-columns:1fr; } }
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:2px; }
        .image-gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.8rem; padding:0.5rem; }
        .image-gallery-item { background:var(--bg-tertiary); border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        .image-gallery-item img { width:100%; height:150px; object-fit:cover; cursor:pointer; }
        .image-gallery-item .caption { padding:0.4rem; font-size:0.65rem; color:var(--text-secondary); word-break:break-all; }
        .toast { position:fixed; bottom:2rem; right:2rem; background:var(--bg-tertiary); color:var(--text); padding:0.6rem 1rem; border-radius:var(--radius); font-size:0.78rem; border:1px solid var(--border); z-index:99999; animation:slideIn 0.25s ease; display:grid; grid-auto-flow:column; align-items:center; gap:0.5rem; box-shadow:var(--shadow); }
        @keyframes slideIn { from { transform:translateY(10px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        .response-body[contenteditable="true"] { outline:none; cursor:text; min-height:2rem; }
        .response-body[contenteditable="true"]:focus { background:rgba(88,166,255,0.02); }
        .response-body[contenteditable="true"][data-modified="true"] { border-left:2px solid var(--orange); }
        .restore-btn { display:none; color:var(--orange); border-color:var(--orange)!important; }
        .restore-btn.visible { display:inline-grid; }
        .restore-btn:hover { background:rgba(240,136,62,0.15)!important; }
        .char-diff-added { background:rgba(63,185,80,0.4); border-radius:2px; padding:0 1px; }
        .char-diff-removed { background:rgba(248,81,73,0.4); border-radius:2px; padding:0 1px; text-decoration:line-through; }
        .char-diff-equal { background:transparent; }
        .diff-added { background:rgba(63,185,80,0.2); }
        .diff-removed { background:rgba(248,81,73,0.2); }
        .diff-modified { background:rgba(210,153,29,0.2); }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header">
            <div class="header-title"><div class="logo">⟁</div><h1>CURL 请求器</h1><span class="badge">DIFF</span></div>
            <div></div>
            <div class="mode-indicator"><span class="mode-dot"></span><span>浏览器直连</span></div>
        </div>
        <div class="toolbar">
            <div class="btn-group">
                <button class="btn btn-primary" id="sendBtn">▶ 发送全部</button>
                <button class="btn btn-outline" id="addCompareBtn">+ 添加对比</button>
                <button class="btn" id="clearBtn">清空</button>
            </div>
            <div></div>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline" id="rawModeBtn">原始</button>
                <button class="btn btn-sm btn-outline btn-active" id="imagePreviewBtn">🖼 预览</button>
                <button class="btn btn-sm btn-outline" id="exampleBtn">示例</button>
                <button class="btn btn-sm btn-outline" id="swapBtn" style="display:none;">交换</button>
                <button class="btn btn-sm btn-outline btn-format" id="formatBtnA" title="格式化当前响应为JSON">⟳ 格式化A</button>
                <button class="btn btn-sm btn-outline btn-format" id="formatBtnB" title="格式化当前响应为JSON" style="display:none;">⟳ 格式化B</button>
            </div>
        </div>
        <div class="main-content single" id="mainContent">
            <div class="request-grid single" id="requestGrid">
                <div class="request-card" id="requestCardA">
                    <div class="request-header">
                        <span class="request-label"><span class="dot dot-a"></span> 请求 A</span>
                        <span></span>
                        <button class="btn btn-sm btn-success" id="sendABtn">▶ 发送</button>
                        <button class="btn btn-sm btn-icon btn-danger" id="clearABtn">✕</button>
                    </div>
                    <div class="editor-container" id="editorA"></div>
                </div>
                <div class="request-card" id="requestCardB" style="display:none;">
                    <div class="request-header">
                        <span class="request-label"><span class="dot dot-b"></span> 请求 B</span>
                        <span></span>
                        <button class="btn btn-sm btn-success" id="sendBBtn">▶ 发送</button>
                        <button class="btn btn-sm btn-icon btn-danger" id="removeCompareBtn">✕</button>
                    </div>
                    <div class="editor-container" id="editorB"></div>
                </div>
            </div>
            <div class="response-grid single" id="responseGrid">
                <div class="response-panel" id="responsePanelA">
                    <div class="response-header"><span class="status-badge status-pending" id="statusA">等待请求</span><span class="time-text" id="timeA"></span><div class="btn-group"><button class="btn btn-sm btn-icon copy-a">📋</button><button class="btn btn-sm btn-icon search-a">🔍</button><button class="btn btn-sm btn-icon fullscreen-a">⛶</button><button class="btn btn-sm btn-icon restore-btn" id="restoreBtnA" title="恢复原始响应">↺</button></div></div>
                    <div class="response-tabs" id="tabsA" style="display:none;"><button class="tab-btn active" data-tab="formatted">JSON</button><button class="tab-btn" data-tab="raw">原始</button><button class="tab-btn" data-tab="images">图片</button></div>
                    <div class="search-bar" id="searchBarA"><input type="text" class="search-input" id="searchInputA" placeholder="搜索..."><span class="search-count" id="searchCountA"></span><button class="btn btn-sm btn-icon" id="searchPrevA">↑</button><button class="btn btn-sm btn-icon" id="searchNextA">↓</button><button class="btn btn-sm btn-icon" id="searchCloseA">✕</button></div>
                    <div class="response-body" id="responseBodyA" contenteditable="true" data-placeholder="在上方输入 curl 命令并点击发送">在上方输入 curl 命令并点击发送</div>
                </div>
                <div class="response-panel" id="responsePanelB" style="display:none;">
                    <div class="response-header"><span class="status-badge status-pending" id="statusB">等待请求</span><span class="time-text" id="timeB"></span><div class="btn-group"><button class="btn btn-sm btn-icon copy-b">📋</button><button class="btn btn-sm btn-icon search-b">🔍</button><button class="btn btn-sm btn-icon fullscreen-b">⛶</button><button class="btn btn-sm btn-icon restore-btn" id="restoreBtnB" title="恢复原始响应">↺</button></div></div>
                    <div class="response-tabs" id="tabsB" style="display:none;"><button class="tab-btn active" data-tab="formatted">JSON</button><button class="tab-btn" data-tab="raw">原始</button><button class="tab-btn" data-tab="images">图片</button></div>
                    <div class="search-bar" id="searchBarB"><input type="text" class="search-input" id="searchInputB" placeholder="搜索..."><span class="search-count" id="searchCountB"></span><button class="btn btn-sm btn-icon" id="searchPrevB">↑</button><button class="btn btn-sm btn-icon" id="searchNextB">↓</button><button class="btn btn-sm btn-icon" id="searchCloseB">✕</button></div>
                    <div class="response-body" id="responseBodyB" contenteditable="true" data-placeholder="等待请求...">等待请求...</div>
                </div>
            </div>
            <div class="diff-panel" id="diffPanel" style="display:none;">
                <div class="diff-header"><span>差异对比</span><div class="diff-stats" id="diffStats"></div><div class="btn-group"><button class="btn btn-sm btn-outline" id="diffModeBtn">字段对比</button><button class="btn btn-sm btn-icon" id="copyDiffBtn">📋</button><button class="btn btn-sm btn-icon" id="fullscreenDiffBtn">⛶</button></div></div>
                <div class="diff-list" id="diffList"></div>
            </div>
        </div>
        <div class="footer"><span>支持 JSON 格式化 · 图片链接预览 · 四种差异标记 · 点击差异跳转</span><span><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 发送全部</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsondiffpatch@0.5.0/public/build/jsondiffpatch.umd.min.js"></script>

    <script>
        (function() {
            'use strict';

            const DEFAULT_A = `curl -X GET 'https://httpbin.org/json'`;
            const DEFAULT_B = `curl -X GET 'https://httpbin.org/json'`;
            const $ = id => document.getElementById(id);

            let editorA, editorB;
            let compareMode = false;
            let rawA = '',
                rawB = '',
                jsonA = null,
                jsonB = null;
            let diffs = [],
                isLineDiff = false;
            let searchA = { matches: [], idx: -1 },
                searchB = { matches: [], idx: -1 };
            let isRawMode = false;
            let imagePreviewEnabled = true;
            let currentTabA = 'formatted',
                currentTabB = 'formatted';
            let responseMetaA = { contentType: '', isImage: false, imageUrls: [] };
            let responseMetaB = { contentType: '', isImage: false, imageUrls: [] };
            let originalHtmlA = '',
                originalHtmlB = '';
            let originalRawA = '',
                originalRawB = '';
            let originalJsonA = null,
                originalJsonB = null;
            let originalMetaA = { contentType: '', isImage: false, imageUrls: [] };
            let originalMetaB = { contentType: '', isImage: false, imageUrls: [] };
            let originalPlaceholderA = '在上方输入 curl 命令并点击发送';
            let originalPlaceholderB = '等待请求...';
            let modifiedA = false,
                modifiedB = false;

            // ===== 工具函数 =====
            function showToast(msg, icon = '') {
                const t = document.querySelector('.toast');
                if (t) t.remove();
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = `${icon} ${msg}`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }

            function escHtml(s) {
                const d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function isImageUrl(url) {
                if (!url || typeof url !== 'string') return false;
                const ext = /\.(jpg|jpeg|png|gif|webp|bmp|svg|ico)(\?.*)?$/i;
                const pat = /(image|img|photo|picture|avatar|thumbnail|icon|logo|banner)/i;
                return ext.test(url) || pat.test(url);
            }

            function extractImageUrls(obj, urls = []) {
                if (!obj) return urls;
                if (typeof obj === 'string') {
                    if ((obj.startsWith('http://') || obj.startsWith('https://')) && isImageUrl(obj)) {
                        urls.push(obj);
                    }
                } else if (Array.isArray(obj)) {
                    obj.forEach(v => extractImageUrls(v, urls));
                } else if (typeof obj === 'object') {
                    Object.values(obj).forEach(v => extractImageUrls(v, urls));
                }
                return [...new Set(urls)];
            }

            function getValueByPath(obj, path) {
                if (!path) return obj;
                const parts = path.split('.');
                let current = obj;
                for (const part of parts) {
                    if (current === null || current === undefined) return undefined;
                    const match = part.match(/^(.+)\[(\d+)\]$/);
                    if (match) {
                        const key = match[1];
                        const idx = parseInt(match[2], 10);
                        if (current[key] && Array.isArray(current[key])) {
                            current = current[key][idx];
                        } else {
                            return undefined;
                        }
                    } else {
                        current = current[part];
                    }
                }
                return current;
            }

            function diffStrings(oldStr, newStr) {
                if (oldStr === newStr) return [{ text: oldStr, type: 'equal' }];
                const m = oldStr.length,
                    n = newStr.length;
                const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
                for (let i = 1; i <= m; i++) {
                    for (let j = 1; j <= n; j++) {
                        if (oldStr[i - 1] === newStr[j - 1]) {
                            dp[i][j] = dp[i - 1][j - 1] + 1;
                        } else {
                            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                        }
                    }
                }
                let i = m,
                    j = n;
                const fragments = [];
                while (i > 0 || j > 0) {
                    if (i > 0 && j > 0 && oldStr[i - 1] === newStr[j - 1]) {
                        fragments.push({ text: oldStr[i - 1], type: 'equal' });
                        i--;
                        j--;
                    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                        fragments.push({ text: newStr[j - 1], type: 'added' });
                        j--;
                    } else if (i > 0 && (j === 0 || dp[i - 1][j] > dp[i][j - 1])) {
                        fragments.push({ text: oldStr[i - 1], type: 'removed' });
                        i--;
                    } else {
                        break;
                    }
                }
                fragments.reverse();
                const merged = [];
                for (const frag of fragments) {
                    if (merged.length > 0 && merged[merged.length - 1].type === frag.type) {
                        merged[merged.length - 1].text += frag.text;
                    } else {
                        merged.push({ ...frag });
                    }
                }
                return merged;
            }

            function renderJson(obj, level = 0, diffDetails = null, currentPath = '') {
                if (obj === null) {
                    const cls = diffDetails && diffDetails[currentPath] ? `diff-${diffDetails[currentPath].type}` : '';
                    return `<span class="json-null ${cls}">null</span>`;
                }
                if (typeof obj === 'boolean') {
                    const cls = diffDetails && diffDetails[currentPath] ? `diff-${diffDetails[currentPath].type}` : '';
                    return `<span class="json-boolean ${cls}">${obj}</span>`;
                }
                if (typeof obj === 'number') {
                    const cls = diffDetails && diffDetails[currentPath] ? `diff-${diffDetails[currentPath].type}` : '';
                    return `<span class="json-number ${cls}">${obj}</span>`;
                }
                if (typeof obj === 'string') {
                    const escaped = escHtml(obj);
                    let cls = diffDetails && diffDetails[currentPath] ? `diff-${diffDetails[currentPath].type}` : '';
                    let charFragments = null;
                    if (diffDetails && diffDetails[currentPath] && diffDetails[currentPath].charDiff) {
                        charFragments = diffDetails[currentPath].charDiff;
                    }

                    if ((obj.startsWith('http://') || obj.startsWith('https://'))) {
                        if (isImageUrl(obj) && imagePreviewEnabled) {
                            let linkHtml =
                                `<a class="json-link image-link" href="${escHtml(obj)}" target="_blank" data-image="${escHtml(obj)}">${escHtml(obj)}</a>`;
                            return `<span class="json-string"><span class="${cls}">"</span>${linkHtml}<span class="${cls}">"</span></span>
                                <br/><img class="image-preview-inline" src="${escHtml(obj)}" alt="预览" loading="lazy" data-image="${escHtml(obj)}" onclick="event.stopPropagation();document.dispatchEvent(new CustomEvent('preview-image',{detail:'${escHtml(obj)}'}))" />`;
                        }
                        if (charFragments) {
                            const fragHtml = charFragments.map(f => {
                                const text = escHtml(f.text);
                                if (f.type === 'added') return `<span class="char-diff-added">${text}</span>`;
                                if (f.type === 'removed') return `<span class="char-diff-removed">${text}</span>`;
                                return text;
                            }).join('');
                            return `<span class="json-string"><span class="${cls}">"</span><a class="json-link" href="${escHtml(obj)}" target="_blank">${fragHtml}</a><span class="${cls}">"</span></span>`;
                        }
                        return `<span class="json-string"><span class="${cls}">"</span><a class="json-link" href="${escHtml(obj)}" target="_blank">${escHtml(obj)}</a><span class="${cls}">"</span></span>`;
                    }

                    if (charFragments) {
                        const fragHtml = charFragments.map(f => {
                            const text = escHtml(f.text);
                            if (f.type === 'added') return `<span class="char-diff-added">${text}</span>`;
                            if (f.type === 'removed') return `<span class="char-diff-removed">${text}</span>`;
                            return text;
                        }).join('');
                        return `<span class="json-string"><span class="${cls}">"</span>${fragHtml}<span class="${cls}">"</span></span>`;
                    }
                    return `<span class="json-string"><span class="${cls}">"${escaped}"</span></span>`;
                }
                if (Array.isArray(obj)) {
                    if (obj.length === 0) return '<span class="json-bracket">[]</span>';
                    const id = 'a' + Math.random().toString(36).slice(2, 9);
                    let h =
                        `<span class="collapsible" data-target="${id}">▼ [${obj.length}]</span><div id="${id}" style="margin-left:1rem;border-left:1px solid var(--border);padding-left:0.5rem;">`;
                    obj.forEach((v, i) => {
                        const childPath = currentPath ? `${currentPath}[${i}]` : `[${i}]`;
                        h += `<div><span class="json-key">${i}</span>: ${renderJson(v, level + 1, diffDetails, childPath)}</div>`;
                    });
                    return h + '</div>';
                }
                if (typeof obj === 'object') {
                    const keys = Object.keys(obj);
                    if (keys.length === 0) return '<span class="json-bracket">{}</span>';
                    const id = 'o' + Math.random().toString(36).slice(2, 9);
                    let h =
                        `<span class="collapsible" data-target="${id}">▼ {${keys.length}}</span><div id="${id}" style="margin-left:1rem;border-left:1px solid var(--border);padding-left:0.5rem;">`;
                    keys.forEach(k => {
                        const childPath = currentPath ? `${currentPath}.${k}` : k;
                        h += `<div><span class="json-key">"<span class="json-key-text">${escHtml(k)}</span>"</span>: ${renderJson(obj[k], level + 1, diffDetails, childPath)}</div>`;
                    });
                    return h + '</div>';
                }
                return String(obj);
            }

            function bindCollapsible(el) {
                el.querySelectorAll('.collapsible').forEach(c => {
                    c.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const t = document.getElementById(this.dataset.target);
                        if (t) {
                            const hide = t.style.display === 'none';
                            t.style.display = hide ? 'block' : 'none';
                            this.textContent = this.textContent.replace(hide ? '▶' : '▼', hide ? '▼' : '▶');
                        }
                    });
                });
                el.querySelectorAll('.image-preview-inline').forEach(img => {
                    img.addEventListener('click', function(e) {
                        e.stopPropagation();
                        document.dispatchEvent(new CustomEvent('preview-image', { detail: this.dataset
                                .image || this.src }));
                    });
                });
            }

            function openImageOverlay(url) {
                const existing = document.querySelector('.image-preview-overlay');
                if (existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.className = 'image-preview-overlay';
                overlay.innerHTML =
                    `<button class="close-btn" onclick="this.parentElement.remove()">✕</button><img src="${escHtml(url)}" alt="预览" />`;
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
                document.body.appendChild(overlay);
            }

            function renderImageGallery(urls) {
                if (!urls || urls.length === 0) return '<div style="padding:1rem;text-align:center;color:var(--text-muted);">未检测到图片链接</div>';
                let html = '<div class="image-gallery">';
                urls.forEach(url => {
                    html += `
                        <div class="image-gallery-item">
                            <img src="${escHtml(url)}" loading="lazy" onclick="document.dispatchEvent(new CustomEvent('preview-image',{detail:'${escHtml(url)}'}))" />
                            <div class="caption">${escHtml(url)}</div>
                        </div>`;
                });
                html += '</div>';
                return html;
            }

            function renderImageFromBase64(base64) {
                if (!base64 || !base64.startsWith('data:image')) return null;
                return `<div style="padding:0.5rem;text-align:center;"><img src="${base64}" style="max-width:100%;max-height:500px;border-radius:8px;border:1px solid var(--border);" /></div>`;
            }

            function renderFormattedResponse(container, res, side, diffDetails) {
                const tabs = side === 'A' ? $('tabsA') : $('tabsB');
                const tabState = side === 'A' ? currentTabA : currentTabB;

                if (res.isImage && res.text && res.text.startsWith('data:image')) {
                    tabs.style.display = 'grid';
                    const imgHtml = renderImageFromBase64(res.text);
                    if (tabState === 'images' || tabState === 'formatted') {
                        container.innerHTML = imgHtml || '<div>图片无法显示</div>';
                    } else {
                        container.textContent = '图片数据 (base64)';
                    }
                    return;
                }

                if (res.json) {
                    tabs.style.display = 'grid';
                    const imageUrls = res.imageUrls || extractImageUrls(res.json);
                    switch (tabState) {
                        case 'formatted':
                            container.innerHTML = renderJson(res.json, 0, diffDetails || null);
                            bindCollapsible(container);
                            break;
                        case 'raw':
                            container.textContent = JSON.stringify(res.json, null, 2);
                            break;
                        case 'images':
                            container.innerHTML = renderImageGallery(imageUrls);
                            container.style.whiteSpace = 'normal';
                            container.style.fontFamily = 'inherit';
                            break;
                    }
                } else {
                    tabs.style.display = 'none';
                    container.textContent = res.text || '无内容';
                    container.style.whiteSpace = 'pre-wrap';
                    container.style.fontFamily = "'JetBrains Mono', monospace";
                }
            }

            function renderResponse(container, res, side, diffDetails) {
                if (isRawMode && !res.isImage) {
                    const tabs = side === 'A' ? $('tabsA') : $('tabsB');
                    tabs.style.display = 'none';
                    container.textContent = res.text;
                    container.style.whiteSpace = 'pre-wrap';
                    container.style.fontFamily = "'JetBrains Mono', monospace";
                } else {
                    renderFormattedResponse(container, res, side, diffDetails || null);
                }
            }

            function saveOriginal(side, html, raw, json, meta) {
                if (side === 'A') {
                    originalHtmlA = html;
                    originalRawA = raw;
                    originalJsonA = json;
                    originalMetaA = { ...meta };
                } else {
                    originalHtmlB = html;
                    originalRawB = raw;
                    originalJsonB = json;
                    originalMetaB = { ...meta };
                }
            }

            function restoreResponse(side) {
                const body = $(`responseBody${side}`);
                const restoreBtn = $(`restoreBtn${side}`);
                const origHtml = side === 'A' ? originalHtmlA : originalHtmlB;
                const origRaw = side === 'A' ? originalRawA : originalRawB;
                const origJson = side === 'A' ? originalJsonA : originalJsonB;
                const origMeta = side === 'A' ? originalMetaA : originalMetaB;
                const tabs = $(`tabs${side}`);

                if (origHtml) {
                    body.innerHTML = origHtml;
                    if (side === 'A') { rawA = origRaw;
                        jsonA = origJson;
                        responseMetaA = { ...origMeta }; } else { rawB = origRaw;
                        jsonB = origJson;
                        responseMetaB = { ...origMeta }; }
                    if (origJson) {
                        tabs.style.display = 'grid';
                        bindCollapsible(body);
                    }
                } else {
                    const placeholder = side === 'A' ? originalPlaceholderA : originalPlaceholderB;
                    body.textContent = placeholder;
                    body.style.whiteSpace = 'pre-wrap';
                    body.style.fontFamily = "'JetBrains Mono', monospace";
                    tabs.style.display = 'none';
                }
                if (side === 'A') modifiedA = false;
                else modifiedB = false;
                body.setAttribute('data-modified', 'false');
                restoreBtn.classList.remove('visible');
                showToast(`响应 ${side} 已恢复`);
            }

            function checkModified(side) {
                const body = $(`responseBody${side}`);
                const restoreBtn = $(`restoreBtn${side}`);
                const origHtml = side === 'A' ? originalHtmlA : originalHtmlB;
                const isModified = body.innerHTML !== origHtml;
                if (side === 'A') modifiedA = isModified;
                else modifiedB = isModified;
                body.setAttribute('data-modified', isModified);
                if (restoreBtn) restoreBtn.classList.toggle('visible', isModified);
            }

            function parseCurl(cmd) {
                cmd = cmd.replace(/\r\n/g, '\n').replace(/\^\s*\n\s*/g, ' ').replace(/\\\s*\n\s*/g, ' ').replace(/\s+/g,
                    ' ').trim();
                if (!cmd.toLowerCase().startsWith('curl')) throw new Error('不是有效的 curl 命令');
                const r = { method: 'GET', url: '', headers: {}, body: null };
                const um = cmd.match(/(?:https?:\/\/[^\s'"]+)/);
                if (um) r.url = um[0].replace(/['"]/g, '');
                if (/-X\s+POST\b/i.test(cmd)) r.method = 'POST';
                else if (/-X\s+PUT\b/i.test(cmd)) r.method = 'PUT';
                else if (/-X\s+DELETE\b/i.test(cmd)) r.method = 'DELETE';
                else if (/-d\s+|--data\s+/i.test(cmd)) r.method = 'POST';
                const hr = /(?:-H|--header)\s+['"]([^'"]+)['"]/g;
                let m;
                while ((m = hr.exec(cmd))) { const p = m[1].split(':'); r.headers[p[0].trim()] = p.slice(1).join(':')
                        .trim(); }
                const dr = /(?:-d|--data|--data-raw)\s+['"](.+?)['"]\s*(?:-|$)/g;
                while ((m = dr.exec(cmd))) r.body = m[1];
                return r;
            }

            async function doRequest(cmd) {
                const p = parseCurl(cmd);
                if (!p.url) throw new Error('无法解析 URL');
                const opts = { method: p.method, headers: p.headers };
                if (p.body) opts.body = p.body;
                const st = performance.now();
                const resp = await fetch(p.url, opts);
                const elapsed = Math.round(performance.now() - st);
                const ct = resp.headers.get('content-type') || '';

                const arrayBuffer = await resp.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                const isPng = uint8Array.length > 8 &&
                    uint8Array[0] === 0x89 && uint8Array[1] === 0x50 &&
                    uint8Array[2] === 0x4E && uint8Array[3] === 0x47 &&
                    uint8Array[4] === 0x0D && uint8Array[5] === 0x0A &&
                    uint8Array[6] === 0x1A && uint8Array[7] === 0x0A;
                const isJpeg = uint8Array.length > 2 &&
                    uint8Array[0] === 0xFF && uint8Array[1] === 0xD8 && uint8Array[2] === 0xFF;
                const isGif = uint8Array.length > 3 &&
                    uint8Array[0] === 0x47 && uint8Array[1] === 0x49 &&
                    uint8Array[2] === 0x46 && uint8Array[3] === 0x38;
                const isWebp = uint8Array.length > 12 &&
                    uint8Array[0] === 0x52 && uint8Array[1] === 0x49 &&
                    uint8Array[2] === 0x46 && uint8Array[3] === 0x46 &&
                    uint8Array[8] === 0x57 && uint8Array[9] === 0x45 &&
                    uint8Array[10] === 0x42 && uint8Array[11] === 0x50;
                const isBmp = uint8Array.length > 2 &&
                    uint8Array[0] === 0x42 && uint8Array[1] === 0x4D;
                const isImageByHeader = isPng || isJpeg || isGif || isWebp || isBmp;
                const isImageByContentType = ct.startsWith('image/');

                if (isImageByContentType || isImageByHeader) {
                    const blob = new Blob([arrayBuffer], { type: ct || 'image/png' });
                    const reader = new FileReader();
                    const base64 = await new Promise((resolve) => {
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });
                    return {
                        text: base64,
                        json: null,
                        ct: ct,
                        status: resp.status,
                        ok: resp.ok,
                        time: elapsed,
                        isImage: true,
                        imageUrls: []
                    };
                }

                let text = new TextDecoder('utf-8').decode(arrayBuffer);
                let json = null;
                if (ct.includes('json') || text.trim().startsWith('{') || text.trim().startsWith('[')) {
                    try { json = JSON.parse(text); } catch (e) {}
                }
                let imageUrls = [];
                if (json) imageUrls = extractImageUrls(json);
                return { text, json, ct, status: resp.status, ok: resp.ok, time: elapsed, isImage: false, imageUrls };
            }

            // ===== 核心函数：sendRequest（优化） =====
            async function sendRequest(side) {
                const editor = side === 'A' ? editorA : editorB;
                const statusEl = $(`status${side}`);
                const timeEl = $(`time${side}`);
                const bodyEl = $(`responseBody${side}`);
                statusEl.className = 'status-badge status-pending';
                statusEl.textContent = '请求中...';
                bodyEl.textContent = '加载中...';
                try {
                    const res = await doRequest(editor.getValue().trim());
                    if (side === 'A') {
                        rawA = res.text;
                        jsonA = res.json;
                        responseMetaA = { contentType: res.ct, isImage: res.isImage, imageUrls: res.imageUrls || [] };
                    } else {
                        rawB = res.text;
                        jsonB = res.json;
                        responseMetaB = { contentType: res.ct, isImage: res.isImage, imageUrls: res.imageUrls || [] };
                    }
                    updateStatus(statusEl, res.ok, res.status, res.time);
                    timeEl.textContent = `${res.time}ms`;

                    // 强制 formatted 模式渲染
                    if (side === 'A') currentTabA = 'formatted';
                    else currentTabB = 'formatted';
                    const rawBackup = isRawMode;
                    isRawMode = false;
                    renderResponse(bodyEl, res, side, null);
                    isRawMode = rawBackup;

                    saveOriginal(side, bodyEl.innerHTML, res.text, res.json, { contentType: res.ct, isImage: res.isImage,
                        imageUrls: res.imageUrls || [] });
                    if (side === 'A') modifiedA = false;
                    else modifiedB = false;
                    bodyEl.setAttribute('data-modified', 'false');
                    $(`restoreBtn${side}`).classList.remove('visible');

                    if (compareMode) {
                        computeAndShowDiff();
                    }
                } catch (e) {
                    statusEl.className = 'status-badge status-error';
                    statusEl.textContent = '请求失败';
                    bodyEl.textContent = `错误: ${e.message}`;
                }
            }

            function updateStatus(el, ok, status, time) {
                el.className = 'status-badge ' + (ok ? 'status-success' : 'status-error');
                el.textContent = `${ok ? '✓' : '✗'} ${status} · ${time}ms`;
            }

            async function sendBoth() {
                const pA = sendRequest('A');
                const pB = compareMode ? sendRequest('B') : Promise.resolve();
                await Promise.all([pA, pB]);
            }

            function formatCurrentResponse(side) {
                const body = $(`responseBody${side}`);
                const json = side === 'A' ? jsonA : jsonB;
                if (!json) {
                    showToast('当前没有 JSON 数据', '⚠️');
                    return;
                }
                const html = renderJson(json);
                body.innerHTML = html;
                bindCollapsible(body);
                saveOriginal(side, html, side === 'A' ? rawA : rawB, json, side === 'A' ? responseMetaA : responseMetaB);
                if (side === 'A') modifiedA = false;
                else modifiedB = false;
                body.setAttribute('data-modified', 'false');
                $(`restoreBtn${side}`).classList.remove('visible');
                $(`tabs${side}`).style.display = 'grid';
                showToast(`响应 ${side} 已重新格式化`);
                if (compareMode) computeAndShowDiff();
            }

            // ===== 对比核心（直接使用 jsonA/jsonB） =====
            function computeAndShowDiff() {
                const curA = jsonA;
                const curB = jsonB;

                if (curA && curB) {
                    const dp = $('diffPanel');
                    dp.style.display = 'grid';

                    if (isLineDiff) {
                        diffs = computeDiffLineByLine(curA, curB);
                        renderDiffList(diffs);
                        showDiffHighlights(curA, curB);
                    } else {
                        try {
                            const instance = jsondiffpatch.create({ objectHash: o => JSON.stringify(o) });
                            const delta = instance.diff(curA, curB);
                            let diffMap = {};
                            let diffDetails = {};
                            if (delta) {
                                diffMap = extractDiffPaths(delta);
                                for (const path in diffMap) {
                                    if (diffMap[path] === 'modified') {
                                        const oldVal = getValueByPath(curA, path);
                                        const newVal = getValueByPath(curB, path);
                                        if (typeof oldVal === 'string' && typeof newVal === 'string') {
                                            const charDiff = diffStrings(oldVal, newVal);
                                            if (charDiff.some(f => f.type !== 'equal')) {
                                                diffDetails[path] = { type: 'modified', charDiff };
                                            }
                                        }
                                    }
                                }
                            }
                            for (const path in diffMap) {
                                if (!diffDetails[path]) {
                                    diffDetails[path] = { type: diffMap[path] };
                                }
                            }

                            const bodyA = $('responseBodyA');
                            const bodyB = $('responseBodyB');

                            bodyA.innerHTML = renderJson(curA, 0, diffDetails);
                            bodyB.innerHTML = renderJson(curB, 0, diffDetails);
                            bindCollapsible(bodyA);
                            bindCollapsible(bodyB);

                            $('tabsA').style.display = 'none';
                            $('tabsB').style.display = 'none';

                            saveOriginal('A', bodyA.innerHTML, rawA, curA, responseMetaA);
                            saveOriginal('B', bodyB.innerHTML, rawB, curB, responseMetaB);
                            modifiedA = false;
                            modifiedB = false;
                            bodyA.setAttribute('data-modified', 'false');
                            bodyB.setAttribute('data-modified', 'false');
                            $('restoreBtnA').classList.remove('visible');
                            $('restoreBtnB').classList.remove('visible');

                            diffs = Object.entries(diffMap).map(([path, type]) => ({ path, type }));
                            renderDiffList(diffs);
                            $('mainContent').className = 'main-content dual';
                        } catch (e) {
                            showToast('字段对比出错，回退到逐行对比', '⚠️');
                            isLineDiff = true;
                            $('diffModeBtn').textContent = '逐行对比';
                            computeAndShowDiff();
                        }
                    }
                    return;
                }

                // 至少一边不是 JSON → 文本逐行对比
                const textA = rawA || getCurrentText('A');
                const textB = rawB || getCurrentText('B');
                const linesA = textA.split('\n');
                const linesB = textB.split('\n');
                const maxLen = Math.max(linesA.length, linesB.length);
                diffs = [];
                diffLineMap = [];
                for (let i = 0; i < maxLen; i++) {
                    const a = linesA[i] || '';
                    const b = linesB[i] || '';
                    if (a !== b) {
                        const type = !a ? 'added' : !b ? 'removed' : 'modified';
                        diffs.push({ path: `行 ${i + 1}`, type, valueA: a.trim(), valueB: b.trim(), lineNum: i + 1 });
                        diffLineMap.push({ lineNum: i + 1, type });
                    }
                }
                renderDiffList(diffs);
                showDiffHighlightsText(textA, textB);
                $('mainContent').className = 'main-content dual';
                $('diffPanel').style.display = 'grid';
            }

            function getCurrentJson(side) {
                return side === 'A' ? jsonA : jsonB;
            }

            function getCurrentText(side) {
                return $(`responseBody${side}`).textContent;
            }

            function extractDiffPaths(delta, prefix = '') {
                const paths = {};
                if (!delta) return paths;
                if (Array.isArray(delta)) {
                    if (delta.length === 3 && delta[1] === 0 && delta[2] === 0) {
                        paths[prefix] = 'modified';
                    } else if (delta.length === 1) {
                        paths[prefix] = 'added';
                    } else if (delta.length === 3) {
                        paths[prefix] = 'removed';
                    }
                } else if (typeof delta === 'object') {
                    for (const key in delta) {
                        if (key === '_t') {
                            paths[prefix] = 'modified';
                            continue;
                        }
                        const newPrefix = prefix ? `${prefix}.${key}` : key;
                        if (/^\d+$/.test(key)) {
                            const sub = extractDiffPaths(delta[key], `${prefix}[${key}]`);
                            Object.assign(paths, sub);
                        } else {
                            const sub = extractDiffPaths(delta[key], newPrefix);
                            Object.assign(paths, sub);
                        }
                    }
                }
                return paths;
            }

            function computeDiffLineByLine(objA, objB) {
                const linesA = JSON.stringify(objA, null, 2).split('\n');
                const linesB = JSON.stringify(objB, null, 2).split('\n');
                const maxLen = Math.max(linesA.length, linesB.length);
                const result = [];
                diffLineMap = [];
                for (let i = 0; i < maxLen; i++) {
                    const a = linesA[i] || '';
                    const b = linesB[i] || '';
                    if (a !== b) {
                        const type = !a ? 'added' : !b ? 'removed' : 'modified';
                        result.push({ path: `行 ${i + 1}`, type, valueA: a.trim(), valueB: b.trim(), lineNum: i + 1 });
                        diffLineMap.push({ lineNum: i + 1, type });
                    }
                }
                return result;
            }

            function showDiffHighlights(jsonA, jsonB) {
                const aLines = JSON.stringify(jsonA, null, 2).split('\n');
                const bLines = JSON.stringify(jsonB, null, 2).split('\n');
                const maxLen = Math.max(aLines.length, bLines.length);
                let htmlA = '',
                    htmlB = '';
                for (let i = 0; i < maxLen; i++) {
                    const a = aLines[i] || '';
                    const b = bLines[i] || '';
                    const same = a === b;
                    let clsA = '',
                        clsB = '';
                    if (!same) {
                        clsA = !b ? 'removed' : 'modified';
                        clsB = !a ? 'added' : 'modified';
                    }
                    htmlA += `<div class="diff-line ${clsA}" data-line="${i + 1}">${escHtml(a)}</div>`;
                    htmlB += `<div class="diff-line ${clsB}" data-line="${i + 1}">${escHtml(b)}</div>`;
                }
                $('responseBodyA').innerHTML = htmlA;
                $('responseBodyB').innerHTML = htmlB;
                $('tabsA').style.display = 'none';
                $('tabsB').style.display = 'none';
            }

            function showDiffHighlightsText(textA, textB) {
                const linesA = textA.split('\n');
                const linesB = textB.split('\n');
                const maxLen = Math.max(linesA.length, linesB.length);
                let htmlA = '',
                    htmlB = '';
                for (let i = 0; i < maxLen; i++) {
                    const a = linesA[i] || '';
                    const b = linesB[i] || '';
                    const same = a === b;
                    let clsA = '',
                        clsB = '';
                    if (!same) {
                        clsA = !b ? 'removed' : 'modified';
                        clsB = !a ? 'added' : 'modified';
                    }
                    htmlA += `<div class="diff-line ${clsA}" data-line="${i + 1}">${escHtml(a)}</div>`;
                    htmlB += `<div class="diff-line ${clsB}" data-line="${i + 1}">${escHtml(b)}</div>`;
                }
                $('responseBodyA').innerHTML = htmlA;
                $('responseBodyB').innerHTML = htmlB;

            function highlightDiffInResponse(lineNum, side) {
                const body = side === 'A' ? $('responseBodyA') : $('responseBodyB');
                body.querySelectorAll('.highlight-target').forEach(el => el.classList.remove('highlight-target'));
                const target = body.querySelector(`.diff-line[data-line="${lineNum}"]`);
                if (target) {

                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => target.classList.remove('highlight-target'), 3000);

            function renderDiffList(diffs) {
                const dl = $('diffList'),
                    ds = $('diffStats');
                dl.innerHTML = '';
                if (!diffs || diffs.length === 0) {
                    dl.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--green);">✓ 完全一致</div>';
                    ds.innerHTML = '<span class="diff-stat modified">0 处差异</span>';
                    return;
                }
                const counts = {};
                diffs.forEach(d => counts[d.type] = (counts[d.type] || 0) + 1);
                ds.innerHTML = Object.entries(counts).map(([t, c]) => `<span class="diff-stat ${t}">${t} ${c}</span>`)
                    .join('');
                diffs.forEach((d, idx) => {
                    const div = document.createElement('div');
                    div.className = 'diff-item';
                    const lineInfo = d.lineNum ? `行 ${d.lineNum}` : d.path;
                    div.innerHTML = `
                        <span class="diff-type ${d.type}">${d.type}</span>
                        <span class="diff-path">${lineInfo}</span>
                        <span style="font-size:0.6rem;color:var(--text-muted);">点击跳转</span>
                    `;
                    div.addEventListener('click', () => {
                        if (d.lineNum) {
                            highlightDiffInResponse(d.lineNum, 'A');
                            highlightDiffInResponse(d.lineNum, 'B');
                            showToast(`跳转到第 ${d.lineNum} 行`, '📍');
                        } else {

            }

            // ===== 搜索 =====
			/**
			 * 在叶子元素内部高亮所有匹配的 query
			 * @param {Element} el - 一个 json-key-text / json-string / json-number ... 元素
			 * @param {string} query - 搜索词
			 */
			function highlightInLeafElement(el, query) {
				const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
				const textNodes = [];
				let node;
				while ((node = walker.nextNode())) {
					textNodes.push(node);
				}

				const lowerQuery = query.toLowerCase();

				textNodes.forEach(textNode => {
					const text = textNode.textContent;
					const lowerText = text.toLowerCase();
					if (!lowerText.includes(lowerQuery)) return;

					// 按匹配位置分割文本，插入 <mark>
					const fragments = [];
					let lastIdx = 0;
					let idx = lowerText.indexOf(lowerQuery);
					while (idx !== -1) {
						if (idx > lastIdx) {
							fragments.push(document.createTextNode(text.substring(lastIdx, idx)));
						}
						const mark = document.createElement('mark');
						mark.textContent = text.substring(idx, idx + query.length);
						fragments.push(mark);
						lastIdx = idx + query.length;
						idx = lowerText.indexOf(lowerQuery, lastIdx);
					}
					if (lastIdx < text.length) {
						fragments.push(document.createTextNode(text.substring(lastIdx)));
					}

					const frag = document.createDocumentFragment();
					fragments.forEach(f => frag.appendChild(f));
					textNode.parentNode.replaceChild(frag, textNode);
				});
			}

			/**
			 * 安全高亮：仅在 JSON 数据的键/值元素内搜索，不破坏 char-diff 等结构
			 * @param {Element} container
			 * @param {string} query
			 */
			function safeHighlightSimple(container, query) {
				// 1. 清除旧的 <mark> 标签（只移除 mark，不动其他任何标签）
				container.querySelectorAll('mark').forEach(m => {
					const text = document.createTextNode(m.textContent);
					m.parentNode.replaceChild(text, m);
				});
				// 合并相邻文本节点（可选，让后续搜索更干净）
				container.normalize();

				if (!query) return;

				// 2. 只在 JSON 数据的“值”和“键”所在元素内搜索
				const selectors = '.json-key-text, .json-string, .json-number, .json-boolean, .json-null';
				const leafElements = container.querySelectorAll(selectors);

				leafElements.forEach(el => {
					highlightInLeafElement(el, query);
				});
			}

            function initSearch(side) {
                const bar = $(`searchBar${side}`),
                    input = $(`searchInput${side}`);
                const count = $(`searchCount${side}`),
                    body = $(`responseBody${side}`);
                const prev = $(`searchPrev${side}`),
                    next = $(`searchNext${side}`),
                    close = $(`searchClose${side}`);
                const state = side === 'A' ? searchA : searchB;

                function doSearch() {
                    const q = input.value.trim();
                    if (!q) {
                        count.textContent = '';
                        state.matches = [];
                        state.idx = -1;
                        safeHighlightSimple(body, '');
                        return;
                    }
                    safeHighlightSimple(body, q);
                    const marks = body.querySelectorAll('mark');
                    state.matches = Array.from(marks);
                    state.idx = state.matches.length > 0 ? 0 : -1;
                    count.textContent = state.matches.length ? `${state.idx + 1}/${state.matches.length}` : '无匹配';
                    if (state.matches.length > 0) {
                        state.matches.forEach((m, i) => m.classList.toggle('current', i === 0));
                        state.matches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }

                function scrollToMatch(idx) {
                    const marks = body.querySelectorAll('mark');
                    marks.forEach(m => m.classList.remove('current'));
                    if (marks[idx]) {
                        marks[idx].classList.add('current');
                        marks[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }

                input.addEventListener('input', doSearch);
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (state.matches.length === 0) return;
                        state.idx = e.shiftKey ?
                            (state.idx > 0 ? state.idx - 1 : state.matches.length - 1) :
                            (state.idx < state.matches.length - 1 ? state.idx + 1 : 0);
                        scrollToMatch(state.idx);
                        count.textContent = `${state.idx + 1}/${state.matches.length}`;
                    }
                    if (e.key === 'Escape') { bar.classList.remove('active');
                        safeHighlightSimple(body, ''); }
                });
                prev.addEventListener('click', () => {
                    if (state.matches.length === 0) return;
                    state.idx = state.idx > 0 ? state.idx - 1 : state.matches.length - 1;
                    scrollToMatch(state.idx);
                    count.textContent = `${state.idx + 1}/${state.matches.length}`;
                });
                next.addEventListener('click', () => {
                    if (state.matches.length === 0) return;
                    state.idx = state.idx < state.matches.length - 1 ? state.idx + 1 : 0;
                    scrollToMatch(state.idx);
                    count.textContent = `${state.idx + 1}/${state.matches.length}`;
                });
                close.addEventListener('click', () => { bar.classList.remove('active');
                    safeHighlightSimple(body, ''); });
                document.querySelector(`.search-${side.toLowerCase()}`).addEventListener('click', () => {
                    bar.classList.toggle('active');
                    if (bar.classList.contains('active')) input.focus();
                });
            }

            // ===== Tabs =====
            function initTabs(side) {
                const tabsContainer = $(`tabs${side}`);
                if (!tabsContainer) return;
                tabsContainer.addEventListener('click', (e) => {
                    if (e.target.classList.contains('tab-btn')) {
                        tabsContainer.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        const tab = e.target.dataset.tab;
                        if (side === 'A') currentTabA = tab;
                        else currentTabB = tab;
                        const bodyEl = $(`responseBody${side}`);
                        const json = side === 'A' ? jsonA : jsonB;
                        const raw = side === 'A' ? rawA : rawB;
                        const meta = side === 'A' ? responseMetaA : responseMetaB;
                        const res = { json, text: raw, isImage: meta.isImage, imageUrls: meta.imageUrls || [] };
                        renderResponse(bodyEl, res, side, null);
                        saveOriginal(side, bodyEl.innerHTML, raw, json, meta);
                        if (side === 'A') modifiedA = false;
                        else modifiedB = false;
                        bodyEl.setAttribute('data-modified', 'false');
                        $(`restoreBtn${side}`).classList.remove('visible');
                    }
                });
            }

            function initMonaco() {

                require(['vs/editor/editor.main'], function() {
                    monaco.languages.register({ id: 'curl' });
                    monaco.languages.setMonarchTokensProvider('curl', {
                        tokenizer: {
                            root: [
                                [/\bcurl\b/, 'keyword'],
                                [/--?[a-zA-Z-]+/, 'type'],
                                [/'[^']*'/, 'string'],
                                [/"[^"]*"/, 'string'],
                                [/https?:\/\/[^\s'"]+/, 'string'],
                                [/\{.*\}/, 'string'],
                            ]
                        }
                    });
                    monaco.editor.defineTheme('customDark', {
                        base: 'vs-dark',
                        inherit: true,
                        rules: [
                            { token: 'keyword', foreground: 'cba6f7', fontStyle: 'bold' },
                            { token: 'type', foreground: '89b4fa' },
                            { token: 'string', foreground: 'a5d6ff' },
                        ],
                        colors: {
                            'editor.background': '#1c2128',
                            'editor.foreground': '#e6edf3',
                            'editor.lineHighlightBackground': '#21262d',
                            'editor.selectionBackground': '#30363d',

                    });

                        theme: 'customDark',

            // ===== 粘贴 =====
            function setupPaste(side) {
                const body = $(`responseBody${side}`);
                body.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const text = (e.clipboardData || window.clipboardData).getData('text');
                    try {
                        const json = JSON.parse(text);
                        const html = renderJson(json);
                        this.innerHTML = html;
                        bindCollapsible(this);
                        if (side === 'A') {
                            jsonA = json;
                            rawA = text;
                            responseMetaA = { contentType: 'application/json', isImage: false, imageUrls: extractImageUrls(
                                json) };
                            saveOriginal('A', html, text, json, responseMetaA);
                            modifiedA = false;
                        } else {
                            jsonB = json;
                            rawB = text;
                            responseMetaB = { contentType: 'application/json', isImage: false, imageUrls: extractImageUrls(
                                json) };
                            saveOriginal('B', html, text, json, responseMetaB);
                            modifiedB = false;
                        }
                        this.setAttribute('data-modified', 'false');
                        $(`restoreBtn${side}`).classList.remove('visible');
                        $(`tabs${side}`).style.display = 'grid';
                        showToast(`已粘贴 JSON 并格式化（${side}）`, '✅');
                        if (compareMode) computeAndShowDiff();
                    } catch (e) {
                        document.execCommand('insertText', false, text);
                        const urlRegex = /(https?:\/\/[^\s"'<>]+)/g;
                        const matches = text.match(urlRegex) || [];
                        const imageUrls = matches.filter(url => isImageUrl(url));
                        if (imageUrls.length > 0) {
                            imageUrls.forEach(url => {
                                const br = document.createElement('br');
                                const img = document.createElement('img');
                                img.className = 'image-preview-inline';
                                img.src = url;
                                img.alt = '预览';
                                img.loading = 'lazy';
                                img.dataset.image = url;
                                img.onclick = (ev) => { ev.stopPropagation();
                                    openImageOverlay(url); };
                                this.appendChild(br);
                                this.appendChild(img);
                            });
                            showToast(`已粘贴文本，检测到 ${imageUrls.length} 张图片（${side}）`, '🖼');
                        }
                        checkModified(side);
                    }
                });
            }

                        const body = $(`responseBody${s}`);

                        body.style.whiteSpace = 'pre-wrap';

                        body.setAttribute('data-modified', 'false');

                        if (s === 'A') {

                            originalRawA = '';
                            originalJsonA = null;
                            originalMetaA = { contentType: '', isImage: false, imageUrls: [] };
                            modifiedA = false;
                        } else {
                            responseMetaB = { contentType: '', isImage: false, imageUrls: [] };
                            originalHtmlB = '';
                            originalRawB = '';
                            originalJsonB = null;
                            originalMetaB = { contentType: '', isImage: false, imageUrls: [] };
                            modifiedB = false;
                        }
                    });
                    $('diffPanel').style.display = 'none';
