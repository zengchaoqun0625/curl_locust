                $('diffModeBtn').addEventListener('click', () => {
                    isLineDiff = !isLineDiff;
                    $('diffModeBtn').textContent = isLineDiff ? '逐行对比' : '字段对比';
                    if (compareMode) computeAndShowDiff();
                });

                $('rawModeBtn').addEventListener('click', () => {
                    isRawMode = !isRawMode;
                    $('rawModeBtn').classList.toggle('btn-active', isRawMode);
                    $('rawModeBtn').textContent = isRawMode ? 'JSON' : '原始';
                    if (jsonA) {
                        renderResponse($('responseBodyA'), { text: rawA, json: jsonA, isImage: responseMetaA
                                .isImage, imageUrls: responseMetaA.imageUrls }, 'A', null);
                        saveOriginal('A', $('responseBodyA').innerHTML, rawA, jsonA, responseMetaA);
                        modifiedA = false;
                        $('restoreBtnA').classList.remove('visible');
                    }
                    if (jsonB) {
                        renderResponse($('responseBodyB'), { text: rawB, json: jsonB, isImage: responseMetaB
                                .isImage, imageUrls: responseMetaB.imageUrls }, 'B', null);
                        saveOriginal('B', $('responseBodyB').innerHTML, rawB, jsonB, responseMetaB);
                        modifiedB = false;
                        $('restoreBtnB').classList.remove('visible');
                    }
                });

                $('imagePreviewBtn').addEventListener('click', () => {
                    imagePreviewEnabled = !imagePreviewEnabled;
                    $('imagePreviewBtn').classList.toggle('btn-active', imagePreviewEnabled);
                    $('imagePreviewBtn').textContent = imagePreviewEnabled ? '🖼 预览' : '🖼 预览:关';
                    if (jsonA) {
                        renderResponse($('responseBodyA'), { text: rawA, json: jsonA, isImage: responseMetaA
                                .isImage, imageUrls: responseMetaA.imageUrls }, 'A', null);
                        saveOriginal('A', $('responseBodyA').innerHTML, rawA, jsonA, responseMetaA);
                        modifiedA = false;
                        $('restoreBtnA').classList.remove('visible');
                    }
                    if (jsonB) {
                        renderResponse($('responseBodyB'), { text: rawB, json: jsonB, isImage: responseMetaB
                                .isImage, imageUrls: responseMetaB.imageUrls }, 'B', null);
                        saveOriginal('B', $('responseBodyB').innerHTML, rawB, jsonB, responseMetaB);
                        modifiedB = false;
                        $('restoreBtnB').classList.remove('visible');
                    }
                });

                $('copyDiffBtn').addEventListener('click', () => {
                    const text = diffs.map(d => `${d.type}: ${d.path}`).join('\n') || '无差异';
                    navigator.clipboard.writeText(text);
                    showToast('已复制差异报告');
                });

                document.querySelector('.copy-a').addEventListener('click', () => {
                    navigator.clipboard.writeText(rawA || $('responseBodyA').textContent);
                    showToast('已复制响应 A');
                });
                document.querySelector('.copy-b').addEventListener('click', () => {
                    navigator.clipboard.writeText(rawB || $('responseBodyB').textContent);
                    showToast('已复制响应 B');
                });

                document.querySelector('.fullscreen-a').addEventListener('click', () => toggleFullscreen($(
                    'responsePanelA')));
                document.querySelector('.fullscreen-b').addEventListener('click', () => toggleFullscreen($(
                    'responsePanelB')));
                $('fullscreenDiffBtn').addEventListener('click', () => toggleFullscreen($('diffPanel')));

                $('restoreBtnA').addEventListener('click', () => restoreResponse('A'));
                $('restoreBtnB').addEventListener('click', () => restoreResponse('B'));

                $('formatBtnA').addEventListener('click', () => formatCurrentResponse('A'));
                $('formatBtnB').addEventListener('click', () => formatCurrentResponse('B'));

                document.addEventListener('keydown', e => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault();
                        sendBoth(); }
                    if (e.key === 'Escape') {
                        document.querySelectorAll('.fullscreen').forEach(el => el.classList.remove(
                        'fullscreen'));
                    }
                });

                document.addEventListener('preview-image', (e) => {
                    openImageOverlay(e.detail);
                });

                let syncing = false;
                const bodyA = $('responseBodyA'),
                    bodyB = $('responseBodyB');
                bodyA.addEventListener('scroll', () => { if (!syncing) { syncing = true;
                        bodyB.scrollTop = bodyA.scrollTop;
                        setTimeout(() => syncing = false, 10); } });
                bodyB.addEventListener('scroll', () => { if (!syncing) { syncing = true;
                        bodyA.scrollTop = bodyB.scrollTop;
                        setTimeout(() => syncing = false, 10); } });

                bodyA.addEventListener('input', () => checkModified('A'));
                bodyB.addEventListener('input', () => checkModified('B'));
            }

            // ===== 初始化 =====
            function init() {
                initMonaco();
                setTimeout(() => {
                    initSearch('A');
                    initSearch('B');
                    initTabs('A');
                    initTabs('B');
                    setupPaste('A');
                    setupPaste('B');
                    bindEvents();
                }, 300);
            }

            window.openImageOverlay = openImageOverlay;
            init();
        })();
    </script>
</body>
</html>
