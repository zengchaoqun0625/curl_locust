<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURL · API 对比器</title>
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2358a6ff'/><stop offset='100%' style='stop-color:%23a371f7'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white' font-weight='bold'>⟁</text></svg>">
    
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsondiffpatch@0.5.0/public/formatters-styles/html.css">

    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --border: #30363d;
            --border-light: #484f58;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-a: #58a6ff;
            --accent-b: #d2991d;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d2991d;
            --blue: #58a6ff;
            --purple: #a371f7;
            --pink: #db61a2;
            --orange: #f0883e;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 4px 16px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            line-height: 1.5;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            height: 94vh;
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 0.8rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .header-title {
            display: grid;
            grid-auto-flow: column;
            align-items: center;
            gap: 0.6rem;
        }
        .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent-a), var(--purple));
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-size: 0.9rem;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text);
        }
        .badge {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-a);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 12px;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }
        .mode-indicator {
            display: grid;
            grid-auto-flow: column;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
        }
        .mode-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Toolbar */
        .toolbar {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 0.6rem;
        }
        .btn-group { display: grid; grid-auto-flow: column; gap: 0.5rem; }

        .btn {
            display: inline-grid;
            grid-auto-flow: column;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.9rem;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 0.78rem;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn:hover { background: var(--border-light); border-color: var(--text-muted); }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
            font-weight: 600;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.72rem; }
        .btn-icon { padding: 0.4rem; min-width: 30px; justify-content: center; }
        .btn-outline { background: transparent; border-color: var(--border); }
        .btn-outline:hover { border-color: var(--accent-a); color: var(--accent-a); }
        .btn-active { background: rgba(88, 166, 255, 0.15); border-color: var(--accent-a); color: var(--accent-a); }

        /* Main Content */
        .main-content {
            display: grid;
            gap: 0.8rem;
            overflow: hidden;
            min-height: 0;
        }
        .main-content.single { grid-template-rows: auto 1fr; }
        .main-content.dual { grid-template-rows: auto 1fr auto; }

        /* Request Area */
        .request-grid {
            display: grid;
            gap: 0.8rem;
        }
        .request-grid.single { grid-template-columns: 1fr; }
        .request-grid.dual { grid-template-columns: 1fr 1fr; }

        .request-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }
        .request-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0.5rem 0.8rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
        }
        .request-label {
            display: grid;
            grid-auto-flow: column;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-a { background: var(--accent-a); box-shadow: 0 0 6px rgba(88, 166, 255, 0.5); }
        .dot-b { background: var(--accent-b); box-shadow: 0 0 6px rgba(210, 153, 29, 0.5); }
        .editor-container { height: 100px; overflow: hidden; }

        /* Response Area */
        .response-grid {
            display: grid;
            gap: 0.8rem;
            min-height: 0;
        }
        .response-grid.single { grid-template-columns: 1fr; }
        .response-grid.dual { grid-template-columns: 1fr 1fr; }

        .response-panel {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: grid;
            grid-template-rows: auto auto 1fr;
            overflow: hidden;
            min-height: 0;
        }
        .response-panel.fullscreen {
            position: fixed;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            bottom: 1rem;
            width: auto;
            height: auto;
            z-index: 9999;
            border-radius: var(--radius-lg);
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }
        .response-panel.fullscreen.single-fullscreen .response-body {
            display: block;
        }
        .response-panel.fullscreen.dual-fullscreen .response-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .response-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0.4rem 0.7rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
        }
        .response-tabs {
            display: grid;
            grid-auto-flow: column;
            gap: 0.2rem;
            padding: 0.2rem 0.5rem;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 500;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--text); background: var(--bg-tertiary); }
        .tab-btn.active { background: var(--bg-tertiary); color: var(--accent-a); }
        .status-badge {
            display: grid;
            grid-auto-flow: column;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-success { background: rgba(63, 185, 80, 0.12); color: var(--green); }
        .status-error { background: rgba(248, 81, 73, 0.12); color: var(--red); }
        .status-pending { background: rgba(210, 153, 29, 0.12); color: var(--yellow); }
        .time-text { font-size: 0.68rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .search-bar {
            display: none;
            grid-template-columns: 1fr auto auto;
            gap: 0.3rem;
            padding: 0.3rem 0.5rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        .search-bar.active { display: grid; }
        .search-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.25rem 0.5rem;
            color: var(--text);
            font-size: 0.72rem;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
        }
        .search-input:focus { border-color: var(--accent-a); }
        .search-count { font-size: 0.65rem; color: var(--text-muted); white-space: nowrap; }
        .response-body {
            overflow-y: auto;
            padding: 0.8rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.76rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 0;
            position: relative;
        }
        .response-body.raw-mode { white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; }
        .response-body mark { background: rgba(210, 153, 29, 0.35); padding: 0 2px; border-radius: 2px; }
        .response-body mark.current { background: rgba(248, 129, 59, 0.5); outline: 1px solid var(--orange); }

        /* JSON styles */
        .json-key { color: var(--accent-a); }
        .json-string { color: #a5d6ff; }
        .json-number { color: var(--orange); }
        .json-boolean { color: var(--pink); }
        .json-null { color: var(--text-muted); }
        .json-bracket { color: var(--text-secondary); }
        .collapsible { cursor: pointer; user-select: none; color: var(--text-secondary); }
        .collapsible:hover { color: var(--text); }
        .json-link {
            color: var(--accent-a);
            text-decoration: underline;
            cursor: pointer;
        }
        .json-link:hover { color: #79c0ff; }
        .json-link.image-link::after {
            content: ' 🖼';
            font-size: 0.8em;
        }

        /* Image preview */
        .image-preview-inline {
            max-width: 300px;
            max-height: 200px;
            border-radius: 6px;
            margin: 4px 0;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .image-preview-inline:hover { transform: scale(1.02); }
        .image-preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 99999;
            display: grid;
            place-items: center;
            cursor: zoom-out;
        }
        .image-preview-overlay img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .image-preview-overlay .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--bg-tertiary);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.2rem;
            display: grid;
            place-items: center;
            z-index: 1;
        }

        /* Diff styles */
        .diff-line { padding: 0 0.5rem; margin: 0 -0.5rem; border-left: 3px solid transparent; }
        .diff-line.added { border-left-color: var(--green); background: rgba(63, 185, 80, 0.06); }
        .diff-line.removed { border-left-color: var(--red); background: rgba(248, 81, 73, 0.06); }
        .diff-line.modified { border-left-color: var(--yellow); background: rgba(210, 153, 29, 0.06); }

        /* Diff Panel */
        .diff-panel {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: grid;
            grid-template-rows: auto 1fr;
            max-height: 200px;
            overflow: hidden;
        }
        .diff-panel.fullscreen {
            position: fixed;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            bottom: 1rem;
            width: auto;
            height: auto;
            z-index: 9999;
            max-height: none;
            border-radius: var(--radius-lg);
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }
        .diff-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0.4rem 0.7rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .diff-stats {
            display: grid;
            grid-auto-flow: column;
            gap: 0.4rem;
        }
        .diff-stat {
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .diff-stat.added { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .diff-stat.removed { background: rgba(248, 81, 73, 0.15); color: var(--red); }
        .diff-stat.modified { background: rgba(210, 153, 29, 0.15); color: var(--yellow); }
        .diff-list {
            overflow-y: auto;
            padding: 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
        }
        .diff-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.1s;
            align-items: center;
        }
        .diff-item:hover { background: var(--bg-tertiary); }
        .diff-type {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.1rem 0.4rem;
            border-radius: 8px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .diff-type.added { background: rgba(63, 185, 80, 0.2); color: var(--green); }
        .diff-type.removed { background: rgba(248, 81, 73, 0.2); color: var(--red); }
        .diff-type.modified { background: rgba(210, 153, 29, 0.2); color: var(--yellow); }
        .diff-path { color: var(--text-secondary); }
        .diff-preview { color: var(--text-muted); font-size: 0.65rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-tertiary);
            color: var(--text);
            padding: 0.6rem 1rem;
            border-radius: var(--radius);
            font-size: 0.78rem;
            border: 1px solid var(--border);
            z-index: 99999;
            animation: slideIn 0.25s ease;
            display: grid;
            grid-auto-flow: column;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow);
        }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Footer */
        .footer {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        .footer kbd {
            background: var(--bg-tertiary);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid var(--border);
        }

        @media (max-width: 900px) {
            .request-grid.dual, .response-grid.dual { grid-template-columns: 1fr; }
            .app-container { height: auto; min-height: 95vh; padding: 0.8rem; }
            .btn { padding: 0.4rem 0.6rem; font-size: 0.7rem; }
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <div class="logo">⟁</div>
                <h1>API 对比器</h1>
                <span class="badge">DIFF</span>
            </div>
            <div></div>
            <div class="mode-indicator">
                <span class="mode-dot"></span>
                <span>浏览器直连</span>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="btn-group">
                <button class="btn btn-primary" id="sendBtn">▶ 发送请求</button>
                <button class="btn btn-outline" id="addCompareBtn">+ 添加对比</button>
                <button class="btn" id="clearBtn">清空</button>
            </div>
            <div></div>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline" id="rawModeBtn">原始</button>
                <button class="btn btn-sm btn-outline" id="imagePreviewBtn">🖼 图片预览</button>
                <button class="btn btn-sm btn-outline" id="exampleBtn">示例</button>
                <button class="btn btn-sm btn-outline" id="swapBtn" style="display:none;">交换</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content single" id="mainContent">
            <!-- Request Area -->
            <div class="request-grid single" id="requestGrid">
                <div class="request-card" id="requestCardA">
                    <div class="request-header">
                        <span class="request-label"><span class="dot dot-a"></span> 请求 A</span>
                        <span></span>
                        <button class="btn btn-sm btn-icon" id="clearABtn" title="清空">✕</button>
                    </div>
                    <div class="editor-container" id="editorA"></div>
                </div>
                <div class="request-card" id="requestCardB" style="display:none;">
                    <div class="request-header">
                        <span class="request-label"><span class="dot dot-b"></span> 请求 B</span>
                        <span></span>
                        <button class="btn btn-sm btn-icon" id="removeCompareBtn" title="移除对比">✕</button>
                    </div>
                    <div class="editor-container" id="editorB"></div>
                </div>
            </div>

            <!-- Response Area -->
            <div class="response-grid single" id="responseGrid">
                <div class="response-panel" id="responsePanelA">
                    <div class="response-header">
                        <span class="status-badge status-pending" id="statusA">等待请求</span>
                        <span class="time-text" id="timeA"></span>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-icon copy-a" title="复制响应">📋</button>
                            <button class="btn btn-sm btn-icon search-a" title="搜索">🔍</button>
                            <button class="btn btn-sm btn-icon fullscreen-a" title="全屏">⛶</button>
                        </div>
                    </div>
                    <div class="response-tabs" id="tabsA" style="display:none;">
                        <button class="tab-btn active" data-tab="formatted">JSON 格式化</button>
                        <button class="tab-btn" data-tab="raw">原始文本</button>
                        <button class="tab-btn" data-tab="images">图片预览</button>
                    </div>
                    <div class="search-bar" id="searchBarA">
                        <input type="text" class="search-input" id="searchInputA" placeholder="搜索...">
                        <span class="search-count" id="searchCountA"></span>
                        <button class="btn btn-sm btn-icon" id="searchPrevA">↑</button>
                        <button class="btn btn-sm btn-icon" id="searchNextA">↓</button>
                        <button class="btn btn-sm btn-icon" id="searchCloseA">✕</button>
                    </div>
                    <div class="response-body" id="responseBodyA">在左侧输入 curl 命令并点击发送</div>
                </div>
                <div class="response-panel" id="responsePanelB" style="display:none;">
                    <div class="response-header">
                        <span class="status-badge status-pending" id="statusB">等待请求</span>
                        <span class="time-text" id="timeB"></span>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-icon copy-b" title="复制响应">📋</button>
                            <button class="btn btn-sm btn-icon search-b" title="搜索">🔍</button>
                            <button class="btn btn-sm btn-icon fullscreen-b" title="全屏">⛶</button>
                        </div>
                    </div>
                    <div class="response-tabs" id="tabsB" style="display:none;">
                        <button class="tab-btn active" data-tab="formatted">JSON 格式化</button>
                        <button class="tab-btn" data-tab="raw">原始文本</button>
                        <button class="tab-btn" data-tab="images">图片预览</button>
                    </div>
                    <div class="search-bar" id="searchBarB">
                        <input type="text" class="search-input" id="searchInputB" placeholder="搜索...">
                        <span class="search-count" id="searchCountB"></span>
                        <button class="btn btn-sm btn-icon" id="searchPrevB">↑</button>
                        <button class="btn btn-sm btn-icon" id="searchNextB">↓</button>
                        <button class="btn btn-sm btn-icon" id="searchCloseB">✕</button>
                    </div>
                    <div class="response-body" id="responseBodyB">等待请求...</div>
                </div>
            </div>

            <!-- Diff Panel -->
            <div class="diff-panel" id="diffPanel" style="display:none;">
                <div class="diff-header">
                    <span>差异对比</span>
                    <div class="diff-stats" id="diffStats"></div>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline" id="diffModeBtn">逐行对比</button>
                        <button class="btn btn-sm btn-icon" id="copyDiffBtn" title="复制">📋</button>
                        <button class="btn btn-sm btn-icon" id="fullscreenDiffBtn" title="全屏">⛶</button>
                    </div>
                </div>
                <div class="diff-list" id="diffList"></div>
                <div class="response-body" id="diffVisualBody" style="display:none;"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>支持 JSON 格式化 · 图片链接预览 · 四种差异标记</span>
            <span><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 发送</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsondiffpatch@0.5.0/public/build/jsondiffpatch.umd.min.js"></script>
    <script>
    (function() {
        const DEFAULT_A = `curl -X GET 'https://httpbin.org/json'`;
        const DEFAULT_B = `curl -X GET 'https://httpbin.org/json'`;

        const $ = id => document.getElementById(id);
        let editorA, editorB;
        let compareMode = false;
        let rawA = '', rawB = '', jsonA = null, jsonB = null;
        let diffs = [], isLineDiff = true;
        let searchA = { matches: [], idx: -1 }, searchB = { matches: [], idx: -1 };
        let isRawMode = false;
        let imagePreviewEnabled = true;
        let currentTabA = 'formatted', currentTabB = 'formatted';

        function showToast(msg, icon = '') {
            const t = document.querySelector('.toast');
            if (t) t.remove();
            const el = document.createElement('div');
            el.className = 'toast';
            el.textContent = `${icon} ${msg}`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function parseCurl(cmd) {
            cmd = cmd.replace(/\r\n/g, '\n').replace(/\^\s*\n\s*/g, ' ').replace(/\\\s*\n\s*/g, ' ').replace(/\s+/g, ' ').trim();
            if (!cmd.toLowerCase().startsWith('curl')) throw new Error('不是有效的 curl 命令');
            const r = { method: 'GET', url: '', headers: {}, body: null };
            const um = cmd.match(/(?:https?:\/\/[^\s'"]+)/);
            if (um) r.url = um[0].replace(/['"]/g, '');
            if (/-X\s+POST\b/i.test(cmd)) r.method = 'POST';
            else if (/-X\s+PUT\b/i.test(cmd)) r.method = 'PUT';
            else if (/-X\s+DELETE\b/i.test(cmd)) r.method = 'DELETE';
            else if (/-d\s+|--data\s+/i.test(cmd)) r.method = 'POST';
            const hr = /(?:-H|--header)\s+['"]([^'"]+)['"]/g;
            let m;
            while ((m = hr.exec(cmd))) { const p = m[1].split(':'); r.headers[p[0].trim()] = p.slice(1).join(':').trim(); }
            const dr = /(?:-d|--data|--data-raw)\s+['"](.+?)['"]\s*(?:-|$)/g;
            while ((m = dr.exec(cmd))) r.body = m[1];
            return r;
        }

        async function doRequest(cmd) {
            const p = parseCurl(cmd);
            if (!p.url) throw new Error('无法解析 URL');
            const opts = { method: p.method, headers: p.headers };
            if (p.body) opts.body = p.body;
            const st = performance.now();
            const resp = await fetch(p.url, opts);
            const elapsed = Math.round(performance.now() - st);
            const ct = resp.headers.get('content-type') || '';
            let text = await resp.text(), json = null;
            if (ct.includes('json') || text.trim().startsWith('{') || text.trim().startsWith('[')) {
                try { json = JSON.parse(text); text = JSON.stringify(json, null, 2); } catch (e) {}
            }
            return { text, json, ct, status: resp.status, ok: resp.ok, time: elapsed };
        }

        function isImageUrl(url) {
            if (!url || typeof url !== 'string') return false;
            const imageExtensions = /\.(jpg|jpeg|png|gif|webp|bmp|svg|ico)(\?.*)?$/i;
            const imagePatterns = /(image|img|photo|picture|avatar|thumbnail|icon|logo|banner)/i;
            return imageExtensions.test(url) || imagePatterns.test(url);
        }

        function extractImageUrls(obj, urls = []) {
            if (!obj) return urls;
            if (typeof obj === 'string') {
                if ((obj.startsWith('http://') || obj.startsWith('https://')) && isImageUrl(obj)) {
                    urls.push(obj);
                }
            } else if (Array.isArray(obj)) {
                obj.forEach(v => extractImageUrls(v, urls));
            } else if (typeof obj === 'object') {
                Object.values(obj).forEach(v => extractImageUrls(v, urls));
            }
            return [...new Set(urls)];
        }

        function renderJson(obj, level = 0) {
            if (obj === null) return '<span class="json-null">null</span>';
            if (typeof obj === 'boolean') return `<span class="json-boolean">${obj}</span>`;
            if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;
            if (typeof obj === 'string') {
                const escaped = escHtml(obj);
                if ((obj.startsWith('http://') || obj.startsWith('https://'))) {
                    if (isImageUrl(obj) && imagePreviewEnabled) {
                        return `<span class="json-string">"</span><a class="json-link image-link" href="${escHtml(obj)}" target="_blank" data-image="${escHtml(obj)}">${escHtml(obj)}</a><span class="json-string">"</span>
                            <br><img class="image-preview-inline" src="${escHtml(obj)}" alt="预览" loading="lazy" data-image="${escHtml(obj)}" onclick="event.stopPropagation();">`;
                    }
                    return `<span class="json-string">"</span><a class="json-link" href="${escHtml(obj)}" target="_blank">${escHtml(obj)}</a><span class="json-string">"</span>`;
                }
                return `<span class="json-string">"${escaped}"</span>`;
            }
            if (Array.isArray(obj)) {
                if (obj.length === 0) return '<span class="json-bracket">[]</span>';
                const id = 'a' + Math.random().toString(36).slice(2, 9);
                let h = `<span class="collapsible" data-target="${id}">▼ [${obj.length}]</span><div id="${id}" style="margin-left:1rem;border-left:1px solid var(--border);padding-left:0.5rem;">`;
                obj.forEach((v, i) => h += `<div><span class="json-key">${i}</span>: ${renderJson(v, level + 1)}</div>`);
                return h + '</div>';
            }
            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '<span class="json-bracket">{}</span>';
                const id = 'o' + Math.random().toString(36).slice(2, 9);
                let h = `<span class="collapsible" data-target="${id}">▼ {${keys.length}}</span><div id="${id}" style="margin-left:1rem;border-left:1px solid var(--border);padding-left:0.5rem;">`;
                keys.forEach(k => h += `<div><span class="json-key">"${escHtml(k)}"</span>: ${renderJson(obj[k], level + 1)}</div>`);
                return h + '</div>';
            }
            return String(obj);
        }

        function bindCollapsible(el) {
            el.querySelectorAll('.collapsible').forEach(c => {
                c.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const t = document.getElementById(this.dataset.target);
                    if (t) {
                        const hide = t.style.display === 'none';
                        t.style.display = hide ? 'block' : 'none';
                        this.textContent = this.textContent.replace(hide ? '▶' : '▼', hide ? '▼' : '▶');
                    }
                });
            });
            el.querySelectorAll('.image-preview-inline').forEach(img => {
                img.addEventListener('click', function(e) {
                    e.stopPropagation();
                    openImageOverlay(this.dataset.image);
                });
            });
        }

        function openImageOverlay(url) {
            const existing = document.querySelector('.image-preview-overlay');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.className = 'image-preview-overlay';
            overlay.innerHTML = `
                <button class="close-btn" onclick="this.parentElement.remove()">✕</button>
                <img src="${url}" alt="预览">
            `;
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) overlay.remove();
            });
            document.body.appendChild(overlay);
        }

        function renderImageGallery(urls) {
            if (!urls || urls.length === 0) return '<div style="padding:1rem;text-align:center;color:var(--text-muted);">未检测到图片链接</div>';
            let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.8rem;padding:0.5rem;">';
            urls.forEach(url => {
                html += `
                    <div style="background:var(--bg-tertiary);border-radius:8px;overflow:hidden;border:1px solid var(--border);">
                        <img src="${escHtml(url)}" style="width:100%;height:150px;object-fit:cover;cursor:pointer;" onclick="document.dispatchEvent(new CustomEvent('preview-image', {detail:'${escHtml(url)}'}))" loading="lazy">
                        <div style="padding:0.4rem;font-size:0.65rem;color:var(--text-secondary);word-break:break-all;">${escHtml(url)}</div>
                    </div>`;
            });
            html += '</div>';
            return html;
        }

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        function updateStatus(el, ok, status, time) {
            el.className = 'status-badge ' + (ok ? 'status-success' : 'status-error');
            el.textContent = `${ok ? '✓' : '✗'} ${status} · ${time}ms`;
        }

        function renderFormattedResponse(container, res, side) {
            const tabs = side === 'A' ? $('tabsA') : $('tabsB');
            const tabState = side === 'A' ? currentTabA : currentTabB;

            if (res.json) {
                tabs.style.display = 'grid';
                const imageUrls = extractImageUrls(res.json);

                switch (tabState) {
                    case 'formatted':
                        container.innerHTML = renderJson(res.json);
                        bindCollapsible(container);
                        break;
                    case 'raw':
                        container.textContent = JSON.stringify(res.json, null, 2);
                        break;
                    case 'images':
                        container.innerHTML = renderImageGallery(imageUrls);
                        container.style.whiteSpace = 'normal';
                        container.style.fontFamily = 'inherit';
                        break;
                }
            } else {
                tabs.style.display = 'none';
                container.textContent = res.text;
                container.style.whiteSpace = 'pre-wrap';
                container.style.fontFamily = "'JetBrains Mono', monospace";
            }
        }

        function renderResponse(container, res, side) {
            if (isRawMode) {
                const tabs = side === 'A' ? $('tabsA') : $('tabsB');
                tabs.style.display = 'none';
                container.textContent = res.text;
                container.style.whiteSpace = 'pre-wrap';
                container.style.fontFamily = "'JetBrains Mono', monospace";
            } else {
                renderFormattedResponse(container, res, side);
            }
        }

        async function sendRequest(side) {
            const editor = side === 'A' ? editorA : editorB;
            const statusEl = $(`status${side}`);
            const timeEl = $(`time${side}`);
            const bodyEl = $(`responseBody${side}`);
            statusEl.className = 'status-badge status-pending';
            statusEl.textContent = '请求中...';
            bodyEl.textContent = '加载中...';
            try {
                const res = await doRequest(editor.getValue().trim());
                if (side === 'A') { rawA = res.text; jsonA = res.json; }
                else { rawB = res.text; jsonB = res.json; }
                updateStatus(statusEl, res.ok, res.status, res.time);
                timeEl.textContent = `${res.time}ms`;
                renderResponse(bodyEl, res, side);
                if (compareMode && jsonA && jsonB) computeAndShowDiff();
            } catch (e) {
                statusEl.className = 'status-badge status-error';
                statusEl.textContent = '请求失败';
                bodyEl.textContent = `错误: ${e.message}`;
            }
        }

        async function sendBoth() {
            const pA = sendRequest('A');
            const pB = compareMode ? sendRequest('B') : Promise.resolve();
            await Promise.all([pA, pB]);
        }

        function computeDiffLineByLine(objA, objB) {
            const linesA = JSON.stringify(objA, null, 2).split('\n');
            const linesB = JSON.stringify(objB, null, 2).split('\n');
            const maxLen = Math.max(linesA.length, linesB.length);
            const result = [];
            for (let i = 0; i < maxLen; i++) {
                const a = linesA[i] || '';
                const b = linesB[i] || '';
                if (a !== b) {
                    result.push({
                        path: `行 ${i + 1}`,
                        type: !a ? 'added' : !b ? 'removed' : 'modified',
                        valueA: a.trim(),
                        valueB: b.trim(),
                    });
                }
            }
            return result;
        }

        function computeAndShowDiff() {
            if (!jsonA || !jsonB) return;
            const dp = $('diffPanel');
            dp.style.display = 'grid';
            if (isLineDiff) {
                diffs = computeDiffLineByLine(jsonA, jsonB);
            } else {
                diffs = computeDiffJsondiffpatch(jsonA, jsonB);
            }
            renderDiffList(diffs);
            showDiffHighlights();
            $('mainContent').className = 'main-content dual';
        }

        function computeDiffJsondiffpatch(objA, objB) {
            try {
                const instance = jsondiffpatch.create({ objectHash: o => JSON.stringify(o) });
                const delta = instance.diff(objA, objB);
                if (!delta) return [];
                const result = [];
                function walk(d, path = '') {
                    if (!d) return;
                    if (Array.isArray(d)) {
                        if (d.length === 3 && d[1] === 0 && d[2] === 0) result.push({ path: path || 'root', type: 'modified' });
                        else if (d.length === 1) result.push({ path: path || 'root', type: 'added' });
                        else if (d.length === 3) result.push({ path: path || 'root', type: 'removed' });
                    } else if (typeof d === 'object') {
                        for (const k in d) {
                            const np = path ? `${path}.${k}` : k;
                            if (k === '_t') result.push({ path: path || 'root', type: 'modified' });
                            else walk(d[k], np);
                        }
                    }
                }
                walk(delta);
                return result;
            } catch (e) { return []; }
        }

        function renderDiffList(diffs) {
            const dl = $('diffList'), ds = $('diffStats');
            dl.innerHTML = '';
            if (diffs.length === 0) {
                dl.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--green);">✓ 完全一致</div>';
                ds.innerHTML = '<span class="diff-stat modified">0 处差异</span>';
                return;
            }
            const counts = {};
            diffs.forEach(d => counts[d.type] = (counts[d.type] || 0) + 1);
            ds.innerHTML = Object.entries(counts).map(([t, c]) => `<span class="diff-stat ${t}">${t} ${c}</span>`).join('');
            diffs.forEach(d => {
                const div = document.createElement('div');
                div.className = 'diff-item';
                div.innerHTML = `
                    <span class="diff-type ${d.type}">${d.type}</span>
                    <span class="diff-path">${d.path}</span>
                    ${d.valueA ? `<span class="diff-preview" title="${escHtml(d.valueA)}">A: ${escHtml(d.valueA.substring(0, 40))}</span>` : ''}
                    ${d.valueB ? `<span class="diff-preview" title="${escHtml(d.valueB)}">B: ${escHtml(d.valueB.substring(0, 40))}</span>` : ''}
                `;
                div.addEventListener('click', () => highlightDiff(d));
                dl.appendChild(div);
            });
        }

        function showDiffHighlights() {
            const aLines = JSON.stringify(jsonA, null, 2).split('\n');
            const bLines = JSON.stringify(jsonB, null, 2).split('\n');
            const maxLen = Math.max(aLines.length, bLines.length);
            let htmlA = '', htmlB = '';
            for (let i = 0; i < maxLen; i++) {
                const same = aLines[i] === bLines[i];
                const clsA = !same ? (bLines[i] === undefined ? 'removed' : 'modified') : '';
                const clsB = !same ? (aLines[i] === undefined ? 'added' : 'modified') : '';
                htmlA += `<div class="diff-line ${clsA}">${escHtml(aLines[i] || '')}</div>`;
                htmlB += `<div class="diff-line ${clsB}">${escHtml(bLines[i] || '')}</div>`;
            }
            $('responseBodyA').innerHTML = htmlA;
            $('responseBodyB').innerHTML = htmlB;
            $('tabsA').style.display = 'none';
            $('tabsB').style.display = 'none';
        }

        function highlightDiff(diff) {
            const key = diff.path.replace('行 ', '');
            [$('responseBodyA'), $('responseBodyB')].forEach(b => {
                const lines = b.querySelectorAll('.diff-line');
                const idx = parseInt(key) - 1;
                if (lines[idx]) {
                    lines[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    lines[idx].style.background = 'rgba(248, 129, 59, 0.2)';
                    setTimeout(() => lines[idx].style.background = '', 2000);
                }
            });
        }

        function initSearch(side) {
            const bar = $(`searchBar${side}`), input = $(`searchInput${side}`);
            const count = $(`searchCount${side}`), body = $(`responseBody${side}`);
            const prev = $(`searchPrev${side}`), next = $(`searchNext${side}`), close = $(`searchClose${side}`);
            const state = side === 'A' ? searchA : searchB;

            function doSearch() {
                body.querySelectorAll('mark').forEach(m => m.replaceWith(m.textContent));
                const q = input.value.trim();
                if (!q) { count.textContent = ''; state.matches = []; state.idx = -1; return; }
                const text = body.textContent;
                const re = new RegExp(escRegex(q), 'gi');
                const matches = [];
                let m;
                while ((m = re.exec(text)) !== null) matches.push(m.index);
                state.matches = matches;
                state.idx = matches.length > 0 ? 0 : -1;
                count.textContent = matches.length ? `${state.idx + 1}/${matches.length}` : '无匹配';
                if (matches.length > 0) {
                    body.innerHTML = body.innerHTML.replace(new RegExp(`(${escRegex(q)})`, 'gi'), '<mark>$1</mark>');
                    scrollToMatch(body, 0);
                }
            }

            function scrollToMatch(container, idx) {
                const marks = container.querySelectorAll('mark');
                marks.forEach(m => m.classList.remove('current'));
                if (marks[idx]) { marks[idx].classList.add('current'); marks[idx].scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }

            input.addEventListener('input', doSearch);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (state.matches.length === 0) return;
                    state.idx = e.shiftKey ? (state.idx > 0 ? state.idx - 1 : state.matches.length - 1) : (state.idx < state.matches.length - 1 ? state.idx + 1 : 0);
                    scrollToMatch(body, state.idx);
                    count.textContent = `${state.idx + 1}/${state.matches.length}`;
                }
                if (e.key === 'Escape') { bar.classList.remove('active'); body.querySelectorAll('mark').forEach(m => m.replaceWith(m.textContent)); }
            });
            prev.addEventListener('click', () => {
                if (state.matches.length === 0) return;
                state.idx = state.idx > 0 ? state.idx - 1 : state.matches.length - 1;
                scrollToMatch(body, state.idx);
                count.textContent = `${state.idx + 1}/${state.matches.length}`;
            });
            next.addEventListener('click', () => {
                if (state.matches.length === 0) return;
                state.idx = state.idx < state.matches.length - 1 ? state.idx + 1 : 0;
                scrollToMatch(body, state.idx);
                count.textContent = `${state.idx + 1}/${state.matches.length}`;
            });
            close.addEventListener('click', () => { bar.classList.remove('active'); body.querySelectorAll('mark').forEach(m => m.replaceWith(m.textContent)); });
            document.querySelector(`.search-${side.toLowerCase()}`).addEventListener('click', () => { bar.classList.toggle('active'); if (bar.classList.contains('active')) input.focus(); });
        }

        function initTabs(side) {
            const tabsContainer = $(`tabs${side}`);
            if (!tabsContainer) return;
            tabsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('tab-btn')) {
                    tabsContainer.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const tab = e.target.dataset.tab;
                    if (side === 'A') currentTabA = tab;
                    else currentTabB = tab;
                    const bodyEl = $(`responseBody${side}`);
                    const json = side === 'A' ? jsonA : jsonB;
                    const raw = side === 'A' ? rawA : rawB;
                    if (json) {
                        switch (tab) {
                            case 'formatted':
                                bodyEl.innerHTML = renderJson(json);
                                bindCollapsible(bodyEl);
                                bodyEl.style.whiteSpace = 'normal';
                                bodyEl.style.fontFamily = "'JetBrains Mono', 'Fira Code', monospace";
                                break;
                            case 'raw':
                                bodyEl.textContent = JSON.stringify(json, null, 2);
                                bodyEl.style.whiteSpace = 'pre-wrap';
                                bodyEl.style.fontFamily = "'JetBrains Mono', monospace";
                                break;
                            case 'images':
                                const urls = extractImageUrls(json);
                                bodyEl.innerHTML = renderImageGallery(urls);
                                bodyEl.style.whiteSpace = 'normal';
                                bodyEl.style.fontFamily = 'inherit';
                                break;
                        }
                    }
                }
            });
        }

        function toggleFullscreen(panel, isDual = false) {
            panel.classList.toggle('fullscreen');
            if (panel.classList.contains('fullscreen')) {
                if (isDual) panel.classList.add('dual-fullscreen');
                else panel.classList.add('single-fullscreen');
            } else {
                panel.classList.remove('dual-fullscreen', 'single-fullscreen');
            }
        }

        function toggleCompareMode() {
            compareMode = !compareMode;
            const cardB = $('requestCardB'), panelB = $('responsePanelB');
            const swapBtn = $('swapBtn'), addBtn = $('addCompareBtn');
            const reqGrid = $('requestGrid'), respGrid = $('responseGrid');

            if (compareMode) {
                cardB.style.display = 'grid';
                panelB.style.display = 'grid';
                reqGrid.className = 'request-grid dual';
                respGrid.className = 'response-grid dual';
                swapBtn.style.display = '';
                addBtn.textContent = '− 移除对比';
                addBtn.style.borderColor = 'var(--red)';
                addBtn.style.color = 'var(--red)';
                if (!editorB) initEditorB();
            } else {
                cardB.style.display = 'none';
                panelB.style.display = 'none';
                reqGrid.className = 'request-grid single';
                respGrid.className = 'response-grid single';
                swapBtn.style.display = 'none';
                addBtn.textContent = '+ 添加对比';
                addBtn.style.borderColor = '';
                addBtn.style.color = '';
                $('diffPanel').style.display = 'none';
                $('mainContent').className = 'main-content single';
                rawB = ''; jsonB = null; diffs = [];
            }
        }

        function initEditorB() {
            require(['vs/editor/editor.main'], function() {
                const opts = {
                    language: 'curl', theme: 'customDark', fontSize: 13, lineHeight: 20,
                    minimap: { enabled: false }, scrollBeyondLastLine: false, wordWrap: 'on',
                    automaticLayout: true, lineNumbers: 'on', tabSize: 2, folding: true,
                    padding: { top: 8, bottom: 8 },
                    value: DEFAULT_B
                };
                editorB = monaco.editor.create($('editorB'), opts);
            });
        }

        function initMonaco() {
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
            require(['vs/editor/editor.main'], function() {
                monaco.languages.register({ id: 'curl' });
                monaco.languages.setMonarchTokensProvider('curl', {
                    tokenizer: { root: [
                        [/\bcurl\b/, 'keyword'], [/--?[a-zA-Z-]+/, 'type'],
                        [/'[^']*'/, 'string'], [/"[^"]*"/, 'string'],
                        [/https?:\/\/[^\s'"]+/, 'string'], [/\{.*\}/, 'string'],
                    ]}
                });
                monaco.editor.defineTheme('customDark', {
                    base: 'vs-dark', inherit: true,
                    rules: [
                        { token: 'keyword', foreground: 'cba6f7', fontStyle: 'bold' },
                        { token: 'type', foreground: '89b4fa' },
                        { token: 'string', foreground: 'a5d6ff' },
                    ],
                    colors: {
                        'editor.background': '#1c2128', 'editor.foreground': '#e6edf3',
                        'editor.lineHighlightBackground': '#21262d', 'editor.selectionBackground': '#30363d',
                    }
                });
                const opts = {
                    language: 'curl', theme: 'customDark', fontSize: 13, lineHeight: 20,
                    minimap: { enabled: false }, scrollBeyondLastLine: false, wordWrap: 'on',
                    automaticLayout: true, lineNumbers: 'on', tabSize: 2, folding: true,
                    padding: { top: 8, bottom: 8 },
                };
                editorA = monaco.editor.create($('editorA'), { ...opts, value: DEFAULT_A });
            });
        }

        function bindEvents() {
            $('sendBtn').addEventListener('click', sendBoth);
            $('addCompareBtn').addEventListener('click', toggleCompareMode);
            $('clearBtn').addEventListener('click', () => {
                editorA.setValue('');
                if (editorB) editorB.setValue('');
                ['A', 'B'].forEach(s => {
                    $(`responseBody${s}`).textContent = s === 'A' ? '在左侧输入 curl 命令并点击发送' : '等待请求...';
                    $(`responseBody${s}`).style.whiteSpace = 'pre-wrap';
                    $(`responseBody${s}`).style.fontFamily = "'JetBrains Mono', monospace";
                    $(`status${s}`).className = 'status-badge status-pending';
                    $(`status${s}`).textContent = '等待请求';
                    $(`time${s}`).textContent = '';
                    $(`tabs${s}`).style.display = 'none';
                });
                $('diffPanel').style.display = 'none';
                $('mainContent').className = 'main-content single';
                rawA = rawB = ''; jsonA = jsonB = null; diffs = [];
                showToast('已清空');
            });
            $('exampleBtn').addEventListener('click', () => {
                editorA.setValue(DEFAULT_A);
                if (compareMode && editorB) editorB.setValue(DEFAULT_B);
                else if (!compareMode) { toggleCompareMode(); if (editorB) editorB.setValue(DEFAULT_B); }
                showToast('已填入示例');
            });
            $('swapBtn').addEventListener('click', () => {
                if (!editorB) return;
                const tmp = editorA.getValue();
                editorA.setValue(editorB.getValue());
                editorB.setValue(tmp);
                showToast('已交换');
            });
            $('clearABtn').addEventListener('click', () => editorA.setValue(''));
            $('removeCompareBtn').addEventListener('click', toggleCompareMode);
            $('diffModeBtn').addEventListener('click', () => {
                isLineDiff = !isLineDiff;
                $('diffModeBtn').textContent = isLineDiff ? '逐行对比' : '字段对比';
                if (jsonA && jsonB) computeAndShowDiff();
            });
            $('rawModeBtn').addEventListener('click', () => {
                isRawMode = !isRawMode;
                $('rawModeBtn').classList.toggle('btn-active', isRawMode);
                $('rawModeBtn').textContent = isRawMode ? 'JSON' : '原始';
                if (jsonA) renderResponse($('responseBodyA'), { text: rawA, json: jsonA }, 'A');
                if (jsonB) renderResponse($('responseBodyB'), { text: rawB, json: jsonB }, 'B');
            });
            $('imagePreviewBtn').addEventListener('click', () => {
                imagePreviewEnabled = !imagePreviewEnabled;
                $('imagePreviewBtn').classList.toggle('btn-active', imagePreviewEnabled);
                $('imagePreviewBtn').textContent = imagePreviewEnabled ? '🖼 图片预览' : '🖼 图片:关';
                if (jsonA) renderResponse($('responseBodyA'), { text: rawA, json: jsonA }, 'A');
                if (jsonB) renderResponse($('responseBodyB'), { text: rawB, json: jsonB }, 'B');
            });
            $('copyDiffBtn').addEventListener('click', () => {
                const text = diffs.map(d => `${d.type}: ${d.path}`).join('\n') || '无差异';
                navigator.clipboard.writeText(text);
                showToast('已复制差异报告');
            });
            document.querySelector('.copy-a').addEventListener('click', () => {
                navigator.clipboard.writeText(rawA || $('responseBodyA').textContent);
                showToast('已复制响应 A');
            });
            document.querySelector('.copy-b').addEventListener('click', () => {
                navigator.clipboard.writeText(rawB || $('responseBodyB').textContent);
                showToast('已复制响应 B');
            });
            document.querySelector('.fullscreen-a').addEventListener('click', () => toggleFullscreen($('responsePanelA'), compareMode));
            document.querySelector('.fullscreen-b').addEventListener('click', () => toggleFullscreen($('responsePanelB'), compareMode));
            $('fullscreenDiffBtn').addEventListener('click', () => toggleFullscreen($('diffPanel')));

            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendBoth(); }
                if (e.key === 'Escape') {
                    document.querySelectorAll('.fullscreen').forEach(el => el.classList.remove('fullscreen', 'dual-fullscreen', 'single-fullscreen'));
                }
            });

            document.addEventListener('preview-image', (e) => {
                openImageOverlay(e.detail);
            });

            let syncing = false;
            const bodyA = $('responseBodyA'), bodyB = $('responseBodyB');
            bodyA.addEventListener('scroll', () => { if (!syncing) { syncing = true; bodyB.scrollTop = bodyA.scrollTop; setTimeout(() => syncing = false, 10); } });
            bodyB.addEventListener('scroll', () => { if (!syncing) { syncing = true; bodyA.scrollTop = bodyB.scrollTop; setTimeout(() => syncing = false, 10); } });
        }

        function init() {
            initMonaco();
            initSearch('A');
            initSearch('B');
            initTabs('A');
            initTabs('B');
            bindEvents();
        }

        init();
    })();
    </script>
</body>
</html>
